<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS — Company Intelligence Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06090f; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
    canvas { display: block; }

    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 22px 36px;
      display: flex; justify-content: space-between; align-items: flex-start;
      z-index: 100; pointer-events: none;
      background: linear-gradient(to bottom, rgba(6,9,15,0.95) 0%, transparent 100%);
    }
    #header h1 { font-size: 24px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; background: linear-gradient(90deg, #fff 0%, #88aaff 50%, #cc66ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #header .subtitle { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 4px; }
    #header .powered { text-align: right; }
    #header .powered .lbl { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
    #header .powered .brand { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.55); }

    #view-toggle {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      display: flex; z-index: 200; pointer-events: all;
      border: 1px solid rgba(120,160,255,0.2); border-radius: 10px; overflow: hidden;
    }
    .vt-btn { padding: 8px 20px; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; background: rgba(4,8,28,0.85); color: rgba(255,255,255,0.4); border: none; cursor: pointer; transition: all 0.25s; font-family: 'Inter', sans-serif; }
    .vt-btn.active { background: rgba(80,120,255,0.25); color: white; }
    .vt-btn:hover:not(.active) { background: rgba(80,120,255,0.12); color: rgba(255,255,255,0.7); }

    .agent-label { position: fixed; pointer-events: none; text-align: center; transform: translate(-50%, -130%); z-index: 50; transition: opacity 0.3s; }
    .agent-label .a-icon { font-size: 13px; display: block; margin-bottom: 1px; }
    .agent-label .a-name { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
    .agent-label .a-role { font-size: 7px; color: rgba(255,255,255,0.35); white-space: nowrap; }

    .room-label { position: fixed; pointer-events: none; text-align: center; transform: translate(-50%, -50%); z-index: 44; transition: opacity 0.3s; }
    .room-label .r-name { font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; white-space: nowrap; }
    .room-label .r-sub  { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.25; margin-top: 3px; }

    #info-card {
      position: fixed; right: -400px; top: 50%; transform: translateY(-50%);
      width: 330px; background: rgba(4,8,28,0.92); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(120,160,255,0.13); border-radius: 20px; padding: 30px; z-index: 200;
      transition: right 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    #info-card.open { right: 28px; }
    #info-card .c-icon  { font-size: 42px; margin-bottom: 12px; display: block; }
    #info-card .c-name  { font-size: 24px; font-weight: 800; margin-bottom: 3px; }
    #info-card .c-role  { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.38); margin-bottom: 13px; }
    #info-card .c-squad { display: inline-block; padding: 4px 13px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
    #info-card .c-desc  { font-size: 12.5px; line-height: 1.8; color: rgba(255,255,255,0.62); margin-bottom: 20px; }
    .act-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .act-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.28); white-space: nowrap; }
    .act-bg  { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .act-fill{ height: 100%; border-radius: 2px; transition: width 0.5s; }
    .act-pct { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); width: 32px; text-align: right; }
    .c-cmds-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 9px; }
    .cmd-tag { display: inline-block; background: rgba(100,150,255,0.1); border: 1px solid rgba(100,150,255,0.18); border-radius: 6px; padding: 4px 10px; font-size: 10px; font-family: monospace; margin: 3px; color: #88ccff; }
    #close-card { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    #close-card:hover { background: rgba(255,255,255,0.14); color: white; }

    #stats { position: fixed; bottom: 28px; left: 36px; display: flex; gap: 28px; pointer-events: none; }
    .stat .val { font-size: 20px; font-weight: 800; background: linear-gradient(90deg,#88aaff,#cc66ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat .key { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.28); }

    #hint { position: fixed; bottom: 28px; right: 36px; font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.18); text-transform: uppercase; pointer-events: none; animation: blink 5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.18} 50%{opacity:.55} }
    canvas { cursor: grab; }
    canvas:active { cursor: grabbing; }
    canvas.hover { cursor: pointer; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="header">
  <div><h1>AIOS</h1><div class="subtitle">Company Intelligence Hub</div></div>
  <div class="powered"><div class="lbl">Powered by</div><div class="brand">ProCustomer AI</div></div>
</div>

<div id="view-toggle">
  <button class="vt-btn" onclick="location.href='index.html'">🌌 Universo</button>
  <button class="vt-btn active">🏢 Empresa</button>
</div>

<div id="info-card">

  <span class="c-icon" id="c-icon">🤖</span>
  <div class="c-name" id="c-name">—</div>
  <div class="c-role" id="c-role">—</div>

  <div class="act-row">
    <span class="act-lbl">Atividade</span>
    <div class="act-bg"><div class="act-fill" id="c-act-fill"></div></div>
    <span class="act-pct" id="c-act-pct">—</span>

  <div id="c-cmds"></div>
</div>

<div id="stats">

  <div class="stat"><div class="val" id="sv-squads">—</div><div class="key">Setores</div></div>
  <div class="stat"><div class="val">24/7</div><div class="key">Operando</div></div>
</div>

<div id="hint">Clique num agente · Scroll zoom · Arraste para girar</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────────────────────
const SQUADS = [
  {
    id: 'core', name: 'AIOS Core', roomName: 'Command Center',
    color: 0xffaa22, colorHex: '#ffaa22', colorLight: '#ffcc66',
    rx: 0, rz: 0, rw: 14, rd: 14,
    agents: [
      { name: 'Master', role: 'AIOS Master',   icon: '🧠', activity: 0.90, desc: 'Orquestra todo o ecossistema AIOS. Coordena squads, define arquitetura e garante alinhamento estratégico.', commands: ['/agents:aios-master'] },
      { name: 'Craft',  role: 'Squad Creator', icon: '🏗️', activity: 0.55, desc: 'Cria e valida novos squads seguindo arquitetura task-first.', commands: ['/agents:squad-creator'] },
      { name: 'Chief',  role: 'Squad Chief',   icon: '⚡', activity: 0.80, desc: 'Lidera squads em operações complexas multi-agente.', commands: ['/agents:squad-chief'] },
      { name: 'ARES',   role: 'Agente do PC',  icon: '🔴', activity: 1.00, desc: 'Monitor inteligente do PC via WhatsApp. Executa tarefas locais 24/7.', commands: ['/ares'] },
    ]
  },
  {
    id: 'comercial', name: 'Time Comercial', roomName: 'Sales Floor',
    color: 0x2266ff, colorHex: '#2266ff', colorLight: '#6699ff',
    rx: -16, rz: -12, rw: 11, rd: 11,
    agents: [
      { name: 'Duarte',  role: 'Head Comercial',   icon: '👔', activity: 0.55, desc: 'Orquestra toda a operação comercial. Define estratégia e metas.', commands: ['/agents:head-comercial'] },
      { name: 'Mariana', role: 'Closer',            icon: '💎', activity: 0.80, desc: 'Fechamento de contratos high ticket.', commands: ['/agents:closer'] },
      { name: 'Taise',   role: 'SDR',               icon: '📡', activity: 0.95, desc: 'Prospecção ativa e qualificação de leads. Não para nunca.', commands: ['/agents:sdr'] },
      { name: 'Taynara', role: 'Customer Success',  icon: '🌟', activity: 0.65, desc: 'Satisfação e retenção pós-venda.', commands: ['/agents:cs-pos-venda'] },
      { name: 'Letícia', role: 'Copywriter',        icon: '✍️', activity: 0.75, desc: 'Copy persuasivo para todos os canais.', commands: ['/agents:copywriter-vendas'] },
      { name: 'Peçanha', role: 'Analista de Dados', icon: '📊', activity: 0.45, desc: 'Métricas, relatórios e insights do funil.', commands: ['/agents:analista-vendas'] },
    ]
  },
  {
    id: 'content', name: 'Content Creator', roomName: 'Creative Studio',
    color: 0xaa22ee, colorHex: '#aa22ee', colorLight: '#cc66ff',
    rx: 16, rz: -12, rw: 11, rd: 11,
    agents: [
      { name: 'Marco',  role: 'Estrategista',      icon: '🎯', activity: 0.50, desc: 'Estratégia de conteúdo e calendário editorial.', commands: ['/agents:estrategista-conteudo'] },
      { name: 'Luna',   role: 'Roteirista',         icon: '🎬', activity: 0.70, desc: 'Roteiros e storytelling envolvente.', commands: ['/agents:roteirista'] },
      { name: 'Pixel',  role: 'Produtor Vídeo IA', icon: '🎥', activity: 0.85, desc: 'Vídeos com HeyGen + Runway totalmente automatizados.', commands: ['/agents:produtor-video-ia'] },
      { name: 'Forma',  role: 'Adaptador',          icon: '🔄', activity: 0.90, desc: 'Adapta conteúdo para cada plataforma.', commands: ['/agents:adaptador-conteudo'] },
      { name: 'Cronos', role: 'Publicador',         icon: '⏰', activity: 0.60, desc: 'Agenda e publica nos melhores horários.', commands: ['/agents:publicador'] },
    ]
  },
  {
    id: 'dev', name: 'Dev Squad', roomName: 'Tech Lab',
    color: 0x22ddaa, colorHex: '#22ddaa', colorLight: '#66ffcc',
    rx: 16, rz: 12, rw: 11, rd: 11,
    agents: [
      { name: 'Dex',   role: 'Dev',           icon: '💻', activity: 0.88, desc: 'Código de produção, features e bugs.', commands: ['/agents:dev'] },
      { name: 'Gage',  role: 'DevOps',        icon: '🚀', activity: 0.75, desc: 'Infra, CI/CD e monitoramento.', commands: ['/agents:devops'] },
      { name: 'Arc',   role: 'Architect',     icon: '🏛️', activity: 0.40, desc: 'Arquitetura de sistemas e decisões técnicas.', commands: ['/agents:architect'] },
      { name: 'Quinn', role: 'QA',            icon: '🔍', activity: 0.82, desc: 'Qualidade, testes e revisão de código.', commands: ['/agents:qa'] },
      { name: 'DataE', role: 'Data Engineer', icon: '🗄️', activity: 0.72, desc: 'Pipelines de dados e integração de APIs.', commands: ['/agents:data-engineer'] },
    ]
  },
  {
    id: 'product', name: 'Product Squad', roomName: 'Product Lab',
    color: 0xff4488, colorHex: '#ff4488', colorLight: '#ff88bb',
    rx: -16, rz: 12, rw: 11, rd: 11,
    agents: [
      { name: 'PM',  role: 'Product Manager', icon: '📋', activity: 0.58, desc: 'Roadmap, prioridades e alinhamento de produto.', commands: ['/agents:pm'] },
      { name: 'PO',  role: 'Product Owner',   icon: '🎯', activity: 0.78, desc: 'Backlog e entrega de valor incremental.', commands: ['/agents:po'] },
      { name: 'SM',  role: 'Scrum Master',    icon: '🔁', activity: 0.52, desc: 'Cerimônias ágeis e remoção de impedimentos.', commands: ['/agents:sm'] },
      { name: 'Ana', role: 'Analyst',         icon: '📈', activity: 0.48, desc: 'Dados de produto e insights estratégicos.', commands: ['/agents:analyst'] },
    ]
  },
];

// ─────────────────────────────────────────────────────────────
//  SCENE — mesma estrutura do universe.html
// ─────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x06090f);
scene.fog        = new THREE.FogExp2(0x06090f, 0.008);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 600);
camera.position.set(0, 38, 32);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 3));

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.04;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.2;
controls.minDistance     = 8;
controls.maxDistance     = 120;
controls.maxPolarAngle   = Math.PI * 0.47;
controls.minPolarAngle   = Math.PI * 0.05;

// ─────────────────────────────────────────────────────────────
//  HELPERS — idênticos ao universe.html
// ─────────────────────────────────────────────────────────────
function makeGlowTex(hexColor) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  const col = new THREE.Color(hexColor);
  const r = Math.round(col.r*255), g = Math.round(col.g*255), b = Math.round(col.b*255);
  const grad = ctx.createRadialGradient(64,64,0, 64,64,64);
  grad.addColorStop(0,    `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.2,  `rgba(${r},${g},${b},0.7)`);
  grad.addColorStop(0.55, `rgba(${r},${g},${b},0.15)`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.premultiplyAlpha = false;
  return tex;
}

function glow(tex, scale, opacity) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity,
    alphaTest: 0.001, blending: THREE.AdditiveBlending,
    depthWrite: false, depthTest: false,
  }));
  s.scale.setScalar(scale);
  return s;
}

// ─────────────────────────────────────────────────────────────
//  GRID FLOOR TEXTURE
// ─────────────────────────────────────────────────────────────
function makeGridTex(baseColor, lineColor) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = baseColor; ctx.fillRect(0,0,256,256);
  ctx.strokeStyle = lineColor; ctx.lineWidth = 1;
  for (let i = 0; i <= 256; i += 32) {
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,256); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(256,i); ctx.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(5, 5);
  return t;
}

// ─────────────────────────────────────────────────────────────
//  AMBIENT LIGHT
// ─────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x303060, 6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 30, 20);
scene.add(dirLight);

// ─────────────────────────────────────────────────────────────
//  MAIN BASE FLOOR
// ─────────────────────────────────────────────────────────────
const baseFl = new THREE.Mesh(
  new THREE.PlaneGeometry(70, 60),
  new THREE.MeshBasicMaterial({ map: makeGridTex('#0c1020', 'rgba(50,80,150,0.2)') })
);
baseFl.rotation.x = -Math.PI / 2;
baseFl.position.y = 0;
scene.add(baseFl);

// ─────────────────────────────────────────────────────────────
//  BUILD EACH ROOM
// ─────────────────────────────────────────────────────────────
SQUADS.forEach(sq => {
  const { rx, rz, rw, rd, colorHex, color, colorLight } = sq;
  const col = new THREE.Color(colorHex);

  // Colored floor patch
  const floorPatch = new THREE.Mesh(
    new THREE.PlaneGeometry(rw - 0.4, rd - 0.4),
    new THREE.MeshBasicMaterial({ map: makeGridTex(
      `rgb(${Math.round(col.r*18)},${Math.round(col.g*18)},${Math.round(col.b*18)})`,
      `rgba(${Math.round(col.r*255)},${Math.round(col.g*255)},${Math.round(col.b*255)},0.15)`
    )})
  );
  floorPatch.rotation.x = -Math.PI / 2;
  floorPatch.position.set(rx, 0.01, rz);
  scene.add(floorPatch);

  // Neon floor border
  const hw = rw / 2, hd = rd / 2;
  const borderPts = [
    new THREE.Vector3(rx-hw, 0.02, rz-hd),
    new THREE.Vector3(rx+hw, 0.02, rz-hd),
    new THREE.Vector3(rx+hw, 0.02, rz+hd),
    new THREE.Vector3(rx-hw, 0.02, rz+hd),
    new THREE.Vector3(rx-hw, 0.02, rz-hd),
  ];
  const borderLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(borderPts),
    new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.75 })
  );
  scene.add(borderLine);

  // Glass walls — 4 panels (thin semi-transparent boxes)
  const wallH = 3.5, wallT = 0.08;
  const wallMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.1, side: THREE.DoubleSide });

  // N/S walls
  [rz - hd, rz + hd].forEach(wz => {
    const w = new THREE.Mesh(new THREE.BoxGeometry(rw, wallH, wallT), wallMat.clone());
    w.position.set(rx, wallH/2, wz);
    scene.add(w);
  });
  // E/W walls
  [rx - hw, rx + hw].forEach(wx => {
    const w = new THREE.Mesh(new THREE.BoxGeometry(wallT, wallH, rd), wallMat.clone());
    w.position.set(wx, wallH/2, rz);
    scene.add(w);
  });

  // Wall top edge glow
  const topPts = [
    new THREE.Vector3(rx-hw, wallH, rz-hd),
    new THREE.Vector3(rx+hw, wallH, rz-hd),
    new THREE.Vector3(rx+hw, wallH, rz+hd),
    new THREE.Vector3(rx-hw, wallH, rz+hd),
    new THREE.Vector3(rx-hw, wallH, rz-hd),
  ];
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(topPts),
    new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.35 })
  ));

  // Room ambient glow on floor
  const roomGlow = glow(makeGlowTex(colorHex), rw * 1.0, 0.1);
  roomGlow.position.set(rx, 0.1, rz);
  scene.add(roomGlow);

  // Ceiling lamp glow
  const lampGlow = glow(makeGlowTex(colorHex), 5, 0.2);
  lampGlow.position.set(rx, 3.2, rz);
  scene.add(lampGlow);

  // Desks (simple flat boxes)
  const n = sq.agents.length;
  const cols = Math.ceil(Math.sqrt(n)), rows = Math.ceil(n / cols);
  const deskMat = new THREE.MeshBasicMaterial({ color: 0x131a2e });
  const monMat  = new THREE.MeshBasicMaterial({ color: color });

  sq._desks = [];
  for (let i = 0; i < n; i++) {
    const ci = i % cols, ri = Math.floor(i / cols);
    const dx = rx - (cols-1) * 1.9/2 + ci * 1.9;
    const dz = rz - (rows-1) * 1.9/2 + ri * 1.9;
    const cx = Math.max(rx-hw+1.5, Math.min(rx+hw-1.5, dx));
    const cz = Math.max(rz-hd+1.5, Math.min(rz+hd-1.5, dz));

    const desk = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.08, 0.6), deskMat);
    desk.position.set(cx, 0.04, cz);
    scene.add(desk);

    const mon = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.28, 0.04), monMat.clone());
    mon.position.set(cx, 0.08 + 0.14, cz - 0.16);
    scene.add(mon);

    const mg = glow(makeGlowTex(colorHex), 0.45, 0.22);
    mg.position.set(cx, 0.28, cz - 0.16);
    scene.add(mg);

    sq._desks.push({ x: cx, z: cz });
  }

  // Connector line to core
  if (sq.id !== 'core') {
    const coreSq = SQUADS[0];
    const linePts = [
      new THREE.Vector3(coreSq.rx, 0.015, coreSq.rz),
      new THREE.Vector3(rx, 0.015, rz),
    ];
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(linePts),
      new THREE.LineBasicMaterial({ color: 0x1a2a4a, transparent: true, opacity: 0.4 })
    ));
  }
});

// ─────────────────────────────────────────────────────────────
//  AGENT OBJECTS
// ─────────────────────────────────────────────────────────────
const agentObjects = [];
const agentMap = {};

SQUADS.forEach(sq => {
  sq.agents.forEach((agent, i) => {
    const act = agent.activity || 0.5;
    const agentColor = new THREE.Color(sq.color).lerp(new THREE.Color(0xffffff), 0.3);

    // Start near desk
    const desk = sq._desks[i] || { x: sq.rx, z: sq.rz };
    const sx = desk.x + (Math.random()-0.5)*0.4;
    const sz = desk.z + (Math.random()-0.5)*0.4;

    // Pawn body (cylinder)
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.17, 0.42, 8),
      new THREE.MeshLambertMaterial({ color: agentColor, emissive: agentColor, emissiveIntensity: 0.4 })
    );

    // Head (sphere)
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.14, 8, 8),
      new THREE.MeshLambertMaterial({ color: agentColor, emissive: agentColor, emissiveIntensity: 0.6 })
    );
    head.position.y = 0.32;

    const agGroup = new THREE.Group();
    agGroup.add(body);
    agGroup.add(head);
    agGroup.position.set(sx, 0.21, sz);

    // Glow halo
    const haloTex = makeGlowTex(sq.colorHex);
    const halo = glow(haloTex, 1.1, 0.6);
    halo.position.y = 0.1;
    agGroup.add(halo);

    scene.add(agGroup);

    // Floor glow (not inside group — stays at floor level)
    const flGlow = glow(makeGlowTex(sq.colorHex), 0.7, 0.18);
    flGlow.position.set(sx, 0.02, sz);
    scene.add(flGlow);

    // Raycaster tags
    body.userData.isAgent = true; body.userData.idx = agentObjects.length;
    head.userData.isAgent = true; head.userData.idx = agentObjects.length;

    // Activity particles (floating up)
    const particles = [];
    if (act > 0.55) {
      const pCount = Math.round(act * 4);
      for (let p = 0; p < pCount; p++) {
        const ps = glow(makeGlowTex(sq.colorHex), 0.16, 0.85);
        ps.userData.ph = Math.random() * Math.PI * 2;
        ps.userData.sp = 0.22 + Math.random() * 0.3;
        ps.userData.ox = (Math.random()-0.5) * 0.45;
        ps.userData.oz = (Math.random()-0.5) * 0.45;
        agGroup.add(ps);
        particles.push(ps);
      }
    }

    const ao = {
      agGroup, body, head, halo, flGlow, particles,
      agent, squad: sq, act,
      speed: 0.55 + act * 2.0,
      deskX: desk.x, deskZ: desk.z,
      tx: sx, tz: sz,
      wanderT: Math.random() * 3.5,
    };

    agentObjects.push(ao);
    agentMap[sq.id + ':' + agent.name] = ao;
  });
});

// ─────────────────────────────────────────────────────────────
//  HTML LABELS
// ─────────────────────────────────────────────────────────────
const labelsDiv = document.createElement('div');
labelsDiv.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:55;';
document.body.appendChild(labelsDiv);

const agentLabels = agentObjects.map(ao => {
  const el = document.createElement('div'); el.className = 'agent-label';
  el.innerHTML = `<span class="a-icon">${ao.agent.icon}</span><div class="a-name" style="color:${ao.squad.colorLight}">${ao.agent.name}</div><div class="a-role">${ao.agent.role}</div>`;
  labelsDiv.appendChild(el); return el;
});

const roomLabels = SQUADS.map(sq => {
  const el = document.createElement('div'); el.className = 'room-label';
  el.innerHTML = `<div class="r-name" style="color:${sq.colorLight}">${sq.roomName}</div><div class="r-sub" style="color:${sq.colorLight}">${sq.agents.length} agentes</div>`;
  labelsDiv.appendChild(el); return { el, sq };
});

document.getElementById('sv-agents').textContent = SQUADS.reduce((s,q) => s + q.agents.length, 0);
document.getElementById('sv-squads').textContent  = SQUADS.length;

// ─────────────────────────────────────────────────────────────
//  INTERACTION
// ─────────────────────────────────────────────────────────────
const raycaster  = new THREE.Raycaster();
const mouse      = new THREE.Vector2(-9999, -9999);
const _v         = new THREE.Vector3();
let   selectedAO = null;
const clickTargets = agentObjects.map(ao => ao.body).concat(agentObjects.map(ao => ao.head));

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  canvas.className = raycaster.intersectObjects(clickTargets).length ? 'hover' : '';
});

canvas.addEventListener('click', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) openCard(agentObjects[hits[0].object.userData.idx]);
});

function openCard(ao) {
  selectedAO = ao;
  document.getElementById('c-icon').textContent = ao.agent.icon;
  document.getElementById('c-name').textContent = ao.agent.name;
  document.getElementById('c-role').textContent = ao.agent.role;
  document.getElementById('c-desc').textContent = ao.agent.desc;
  const sqEl = document.getElementById('c-squad');
  sqEl.textContent      = ao.squad.name;
  sqEl.style.background = ao.squad.colorHex + '22';
  sqEl.style.color      = ao.squad.colorLight;
  sqEl.style.border     = '1px solid ' + ao.squad.colorHex + '44';
  document.getElementById('c-cmds').innerHTML = ao.agent.commands.map(c => `<span class="cmd-tag">${c}</span>`).join('');
  const pct = Math.round(ao.act * 100);
  const barColor = ao.act < 0.5 ? `hsl(${120-ao.act*60},70%,50%)` : `hsl(${120-ao.act*120},80%,55%)`;
  document.getElementById('c-act-fill').style.width      = pct + '%';
  document.getElementById('c-act-fill').style.background = barColor;
  document.getElementById('c-act-pct').textContent       = pct + '%';
  document.getElementById('info-card').classList.add('open');
}

document.getElementById('close-card').addEventListener('click', () => {
  document.getElementById('info-card').classList.remove('open');
  selectedAO = null;
});

// ─────────────────────────────────────────────────────────────
//  WANDER
// ─────────────────────────────────────────────────────────────
function pickTarget(ao) {
  const sq = ao.squad;
  const margin = 1.6;
  if (Math.random() < 0.28) {
    // Go to desk
    ao.tx = ao.deskX + (Math.random()-0.5)*0.2;
    ao.tz = ao.deskZ + (Math.random()-0.5)*0.2;
    ao.wanderT = 2.0 + (1 - ao.act) * 3.5;
  } else {
    ao.tx = sq.rx + (Math.random()-0.5) * (sq.rw - margin*2);
    ao.tz = sq.rz + (Math.random()-0.5) * (sq.rd - margin*2);
    ao.wanderT = 0.6 + (1 - ao.act) * 2.0 + Math.random() * 1.2;
  }
}
agentObjects.forEach(ao => pickTarget(ao));

// ─────────────────────────────────────────────────────────────
//  COMMUNICATION PULSES
// ─────────────────────────────────────────────────────────────
const commPulses = [];
let nextPulse = 1.2;

function spawnPulse() {
  const coreAg  = agentObjects.filter(ao => ao.squad.id === 'core');
  const otherAg = agentObjects.filter(ao => ao.squad.id !== 'core');
  if (!coreAg.length || !otherAg.length) return;
  const src = coreAg[Math.floor(Math.random() * coreAg.length)];
  const dst = otherAg[Math.floor(Math.random() * otherAg.length)];
  const sp = glow(makeGlowTex(src.squad.colorHex), 0.3, 0.95);
  scene.add(sp);
  commPulses.push({ sp, src, dst, t: 0, dur: 0.45 + Math.random() * 0.5 });
}

// ─────────────────────────────────────────────────────────────
//  ANIMATION
// ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const raw     = clock.getDelta();
  const delta   = Math.min(raw, 0.05);
  const elapsed = clock.elapsedTime;

  agentObjects.forEach((ao, i) => {
    // Wander
    ao.wanderT -= delta;
    if (ao.wanderT <= 0) pickTarget(ao);

    // Move toward target
    const dx = ao.tx - ao.agGroup.position.x;
    const dz = ao.tz - ao.agGroup.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > 0.07) {
      const step = Math.min(ao.speed * delta, dist);
      ao.agGroup.position.x += (dx/dist) * step;
      ao.agGroup.position.z += (dz/dist) * step;
      ao.agGroup.rotation.y  = Math.atan2(dx, dz);
    } else {
      ao.wanderT = 0;
    }

    // Walking bobble
    const moving = dist > 0.1 ? 1 : 0;
    const bobFreq = 2.5 + ao.act * 5;
    ao.agGroup.position.y = 0.21 + moving * Math.abs(Math.sin(elapsed * bobFreq + i)) * 0.04 * ao.act;

    // Halo breathe
    const breathe = 0.8 + 0.2 * Math.sin(elapsed * 2 + i * 0.8);
    const sel = selectedAO === ao;
    ao.halo.scale.setScalar(1.1 * breathe * (sel ? 2.8 : 1));
    ao.halo.material.opacity = 0.55 * breathe * (sel ? 1.5 : 1);

    // Floor glow follow
    ao.flGlow.position.x = ao.agGroup.position.x;
    ao.flGlow.position.z = ao.agGroup.position.z;

    // Particles rise
    ao.particles.forEach(ps => {
      const ph = ps.userData.ph + elapsed * ps.userData.sp;
      const rise = (ph * 0.25) % 1.3;
      ps.position.set(
        ps.userData.ox + Math.sin(ph * 1.4) * 0.15,
        0.45 + rise,
        ps.userData.oz + Math.cos(ph) * 0.15
      );
      ps.material.opacity = Math.sin(rise / 1.3 * Math.PI) * 0.75;
    });

    // Label
    _v.setFromMatrixPosition(ao.agGroup.matrixWorld);
    _v.y += 0.85;
    _v.project(camera);
    if (Math.abs(_v.x) > 1.25 || Math.abs(_v.y) > 1.25 || _v.z > 1) {
      agentLabels[i].style.opacity = '0';
    } else {
      agentLabels[i].style.opacity = '1';
      agentLabels[i].style.left = ((_v.x * .5 + .5) * innerWidth)  + 'px';
      agentLabels[i].style.top  = ((-_v.y * .5 + .5) * innerHeight) + 'px';
    }
  });

  // Room labels
  roomLabels.forEach(({ el, sq }) => {
    _v.set(sq.rx, 0.4, sq.rz);
    _v.project(camera);
    if (Math.abs(_v.x) > 1.25 || Math.abs(_v.y) > 1.25 || _v.z > 1) { el.style.opacity = '0'; return; }
    el.style.opacity = '1';
    el.style.left = ((_v.x * .5 + .5) * innerWidth)  + 'px';
    el.style.top  = ((-_v.y * .5 + .5) * innerHeight + 22) + 'px';
  });

  // Comm pulses
  nextPulse -= delta;
  if (nextPulse <= 0) { spawnPulse(); nextPulse = 0.8 + Math.random() * 1.8; }

  for (let i = commPulses.length - 1; i >= 0; i--) {
    const cp = commPulses[i];
    cp.t += delta / cp.dur;
    if (cp.t >= 1) { scene.remove(cp.sp); commPulses.splice(i, 1); continue; }
    const sp = cp.src.agGroup.position;
    const dp = cp.dst.agGroup.position;
    cp.sp.position.set(
      sp.x + (dp.x - sp.x) * cp.t,
      sp.y + (dp.y - sp.y) * cp.t + Math.sin(cp.t * Math.PI) * 2.0,
      sp.z + (dp.z - sp.z) * cp.t
    );
    cp.sp.material.opacity = Math.sin(cp.t * Math.PI) * 0.9;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
