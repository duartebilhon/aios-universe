<head>

  <style>

    #header .subtitle { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 4px; }
    #header .powered { text-align: right; }
    #header .powered .lbl { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
    #header .powered .brand { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.55); }

    #view-toggle {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);

    .vt-btn:hover:not(.active) { background: rgba(80,120,255,0.12); color: rgba(255,255,255,0.7); }

    .agent-label { position: fixed; pointer-events: none; text-align: center; transform: translate(-50%, -140%); z-index: 50; transition: opacity 0.35s; }
    .agent-label .a-icon { font-size: 14px; display: block; margin-bottom: 1px; }
    .agent-label .a-name { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
    .agent-label .a-role { font-size: 8px; color: rgba(255,255,255,0.38); letter-spacing: 0.5px; white-space: nowrap; }

    .room-label { position: fixed; pointer-events: none; text-align: center; transform: translate(-50%, -50%); z-index: 45; transition: opacity 0.35s; }

    #info-card {
      position: fixed; right: -400px; top: 50%; transform: translateY(-50%);
      width: 330px; background: rgba(4, 8, 28, 0.9); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(120,160,255,0.13); border-radius: 20px; padding: 30px; z-index: 200;
      transition: right 0.5s cubic-bezier(0.25,0.46,0.45,0.94);

    #info-card.open { right: 28px; }
    #info-card .c-icon { font-size: 42px; margin-bottom: 12px; display: block; }
    #info-card .c-name { font-size: 24px; font-weight: 800; margin-bottom: 3px; }
    #info-card .c-role { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.38); margin-bottom: 13px; }
    #info-card .c-squad { display: inline-block; padding: 4px 13px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

    #info-card .c-cmds-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 9px; }
    .activity-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .activity-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.28); white-space: nowrap; }
    .activity-bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .activity-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    .activity-pct { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); width: 32px; text-align: right; }
    .cmd-tag { display: inline-block; background: rgba(100,150,255,0.1); border: 1px solid rgba(100,150,255,0.18); border-radius: 6px; padding: 4px 10px; font-size: 10px; font-family: monospace; margin: 3px; color: #88ccff; }
    #close-card { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    #close-card:hover { background: rgba(255,255,255,0.14); color: white; }

    #stats { position: fixed; bottom: 28px; left: 36px; display: flex; gap: 28px; pointer-events: none; }
    .stat .val { font-size: 20px; font-weight: 800; background: linear-gradient(90deg,#88aaff,#cc66ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat .key { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.28); }
    #hint { position: fixed; bottom: 28px; right: 36px; font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.18); text-transform: uppercase; pointer-events: none; animation: blink 5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.18} 50%{opacity:.55} }
    canvas { cursor: grab; }
    canvas:active { cursor: grabbing; }
    canvas.hover { cursor: pointer; }
  </style>
</head>

<script>

// ─── SQUADS DATA ───────────────────────────────────────────────────────────────
const SQUADS = [
  {

    color:0xffaa22, colorHex:'#ffaa22', colorLight:'#ffcc66',
    rx:0, rz:0, rw:13, rd:13,
    agents:[
      {name:'Master',role:'AIOS Master',  icon:'🧠',activity:0.90,desc:'Orquestra todo o ecossistema AIOS. Coordena squads, define arquitetura e garante alinhamento estratégico.',commands:['/agents:aios-master']},
      {name:'Craft', role:'Squad Creator',icon:'🏗️',activity:0.55,desc:'Cria e valida novos squads seguindo arquitetura task-first.',commands:['/agents:squad-creator']},

      {name:'Mariana',role:'Closer',           icon:'💎',activity:0.80,desc:'Fechamento de contratos high ticket.',commands:['/agents:closer']},

      {name:'Taynara',role:'Customer Success', icon:'🌟',activity:0.65,desc:'Satisfação e retenção pós-venda.',commands:['/agents:cs-pos-venda']},
      {name:'Letícia',role:'Copywriter',       icon:'✍️',activity:0.75,desc:'Copy persuasivo para todos os canais.',commands:['/agents:copywriter-vendas']},

  {

    rx:16, rz:-12, rw:11, rd:11,
    agents:[
      {name:'Marco', role:'Estrategista',     icon:'🎯',activity:0.50,desc:'Estratégia de conteúdo e calendário editorial.',commands:['/agents:estrategista-conteudo']},
      {name:'Luna',  role:'Roteirista',        icon:'🎬',activity:0.70,desc:'Roteiros e storytelling envolvente.',commands:['/agents:roteirista']},
      {name:'Pixel', role:'Produtor Vídeo IA',icon:'🎥',activity:0.85,desc:'Vídeos com HeyGen + Runway totalmente automatizados.',commands:['/agents:produtor-video-ia']},
      {name:'Forma', role:'Adaptador',         icon:'🔄',activity:0.90,desc:'Adapta conteúdo para cada plataforma.',commands:['/agents:adaptador-conteudo']},

      {name:'Quinn',role:'QA',           icon:'🔍',activity:0.82,desc:'Qualidade, testes e revisão de código.',commands:['/agents:qa']},
      {name:'DataE',role:'Data Engineer',icon:'🗄️',activity:0.72,desc:'Pipelines de dados e integração de APIs.',commands:['/agents:data-engineer']},
    ]
  },
  {
    id:'product', name:'Product Squad', roomName:'Product Lab',
    color:0xff4488, colorHex:'#ff4488', colorLight:'#ff88bb',
    rx:-16, rz:12, rw:11, rd:11,
    agents:[
      {name:'PM', role:'Product Manager',icon:'📋',activity:0.58,desc:'Roadmap, prioridades e alinhamento de produto.',commands:['/agents:pm']},
      {name:'PO', role:'Product Owner',  icon:'🎯',activity:0.78,desc:'Backlog e entrega de valor incremental.',commands:['/agents:po']},
      {name:'SM', role:'Scrum Master',   icon:'🔁',activity:0.52,desc:'Cerimônias ágeis e remoção de impedimentos.',commands:['/agents:sm']},
      {name:'Ana',role:'Analyst',        icon:'📈',activity:0.48,desc:'Dados de produto e insights estratégicos.',commands:['/agents:analyst']},
    ]

// ─── SCENE (idêntico ao universe.html) ────────────────────────────────────────
const canvas   = document.getElementById('c');
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x000308);
scene.fog        = new THREE.FogExp2(0x000308, 0.007);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 800);
camera.position.set(0, 28, 30);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 3));

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.04;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.15;
controls.minDistance     = 5;
controls.maxDistance     = 200;
controls.maxPolarAngle   = Math.PI * 0.47;

// ─── GLOW HELPERS (idêntico ao universe.html) ─────────────────────────────────
function makeGlowTex(hexColor) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  const col = new THREE.Color(hexColor);
  const r = Math.round(col.r*255), g = Math.round(col.g*255), b = Math.round(col.b*255);
  const grad = ctx.createRadialGradient(64,64,0, 64,64,64);
  grad.addColorStop(0,    `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.2,  `rgba(${r},${g},${b},0.7)`);
  grad.addColorStop(0.55, `rgba(${r},${g},${b},0.15)`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.premultiplyAlpha = false;
  return tex;
}

function glow(tex, scale, opacity) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity,
    alphaTest: 0.001, blending: THREE.AdditiveBlending,
    depthWrite: false, depthTest: false,
  }));
  s.scale.setScalar(scale);
  return s;
}

// ─── BASE FLOOR ───────────────────────────────────────────────────────────────
{
  // Grid texture for floor
  const fc = document.createElement('canvas'); fc.width = fc.height = 256;
  const fx = fc.getContext('2d');
  fx.fillStyle = '#080e1c'; fx.fillRect(0,0,256,256);
  fx.strokeStyle = 'rgba(40,70,140,0.25)'; fx.lineWidth = 1;
  for (let i=0; i<=256; i+=32) {
    fx.beginPath(); fx.moveTo(i,0); fx.lineTo(i,256); fx.stroke();
    fx.beginPath(); fx.moveTo(0,i); fx.lineTo(256,i); fx.stroke();
  }
  const ftex = new THREE.CanvasTexture(fc);
  ftex.wrapS = ftex.wrapT = THREE.RepeatWrapping; ftex.repeat.set(8,8);
  const fl = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshBasicMaterial({ map: ftex })
  );
  fl.rotation.x = -Math.PI/2;
  scene.add(fl);
}

// ─── ROOMS ────────────────────────────────────────────────────────────────────
SQUADS.forEach(sq => {
  const hw = sq.rw/2, hd = sq.rd/2;

  // Colored floor patch (slightly lighter than base)
  const patchCol = new THREE.Color(sq.colorHex).multiplyScalar(0.07);
  const patch = new THREE.Mesh(
    new THREE.PlaneGeometry(sq.rw - 0.3, sq.rd - 0.3),
    new THREE.MeshBasicMaterial({ color: patchCol })
  );
  patch.rotation.x = -Math.PI/2;
  patch.position.set(sq.rx, 0.01, sq.rz);
  scene.add(patch);

  // Neon floor border
  const bp = [
    new THREE.Vector3(sq.rx-hw, 0.02, sq.rz-hd),
    new THREE.Vector3(sq.rx+hw, 0.02, sq.rz-hd),
    new THREE.Vector3(sq.rx+hw, 0.02, sq.rz+hd),
    new THREE.Vector3(sq.rx-hw, 0.02, sq.rz+hd),
    new THREE.Vector3(sq.rx-hw, 0.02, sq.rz-hd),
  ];
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(bp),
    new THREE.LineBasicMaterial({ color: sq.color, transparent:true, opacity:0.8 })
  ));

  // Glass walls (4 thin semi-transparent panels)
  const wm = new THREE.MeshBasicMaterial({ color: sq.color, transparent:true, opacity:0.08, side:THREE.DoubleSide });
  const wallH = 3.2;
  // N / S
  [-hd, +hd].forEach(wz => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(sq.rw, wallH, 0.08), wm.clone());
    m.position.set(sq.rx, wallH/2, sq.rz + wz);
    scene.add(m);
  });
  // W / E
  [-hw, +hw].forEach(wx => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.08, wallH, sq.rd), wm.clone());
    m.position.set(sq.rx + wx, wallH/2, sq.rz);
    scene.add(m);
  });

  // Wall top edge glow
  const wallH2 = wallH;
  const te = [
    new THREE.Vector3(sq.rx-hw, wallH2, sq.rz-hd),
    new THREE.Vector3(sq.rx+hw, wallH2, sq.rz-hd),
    new THREE.Vector3(sq.rx+hw, wallH2, sq.rz+hd),
    new THREE.Vector3(sq.rx-hw, wallH2, sq.rz+hd),
    new THREE.Vector3(sq.rx-hw, wallH2, sq.rz-hd),
  ];
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(te),
    new THREE.LineBasicMaterial({ color: sq.color, transparent:true, opacity:0.35 })
  ));

  // Room glow on floor
  const rg = glow(makeGlowTex(sq.colorHex), sq.rw * 0.9, 0.1);
  rg.position.set(sq.rx, 0.05, sq.rz);
  scene.add(rg);

  // Ceiling lamp
  const lg = glow(makeGlowTex(sq.colorHex), 5, 0.22);
  lg.position.set(sq.rx, 3.0, sq.rz);
  scene.add(lg);

  // Desks + monitors
  const n = sq.agents.length;
  const nc = Math.ceil(Math.sqrt(n)), nr = Math.ceil(n / nc);
  sq._desks = [];
  for (let i = 0; i < n; i++) {
    const ci = i % nc, ri = Math.floor(i / nc);
    let dx = sq.rx - (nc-1)*1.8/2 + ci*1.8;
    let dz = sq.rz - (nr-1)*1.8/2 + ri*1.8;
    dx = Math.max(sq.rx-hw+1.4, Math.min(sq.rx+hw-1.4, dx));
    dz = Math.max(sq.rz-hd+1.4, Math.min(sq.rz+hd-1.4, dz));

    const desk = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.08, 0.6),
      new THREE.MeshBasicMaterial({ color: 0x111828 })
    );
    desk.position.set(dx, 0.04, dz);
    scene.add(desk);

    const mon = new THREE.Mesh(
      new THREE.BoxGeometry(0.38, 0.26, 0.04),
      new THREE.MeshBasicMaterial({ color: sq.color })
    );
    mon.position.set(dx, 0.25, dz - 0.16);
    scene.add(mon);

    const mg = glow(makeGlowTex(sq.colorHex), 0.4, 0.2);
    mg.position.set(dx, 0.28, dz - 0.16);
    scene.add(mg);

    sq._desks.push({ x:dx, z:dz });
  }

  // Corridor line to core
  if (sq.id !== 'core') {
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0.015, 0),
        new THREE.Vector3(sq.rx, 0.015, sq.rz),
      ]),
      new THREE.LineBasicMaterial({ color:0x1a2a4a, transparent:true, opacity:0.4 })
    ));
  }
});

// ─── AGENTS ───────────────────────────────────────────────────────────────────
const agentObjects = [];

SQUADS.forEach(sq => {
  sq.agents.forEach((agent, i) => {
    const act = agent.activity || 0.5;
    const agCol = new THREE.Color(sq.color).lerp(new THREE.Color(0xffffff), 0.3);

    const desk = sq._desks[i] || { x:sq.rx, z:sq.rz };
    const sx = desk.x + (Math.random()-0.5)*0.3;
    const sz = desk.z + (Math.random()-0.5)*0.3;

    // Pawn body
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.17, 0.40, 8),
      new THREE.MeshBasicMaterial({ color: agCol })
    );
    // Head
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.14, 8, 8),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(agCol).lerp(new THREE.Color(0xffffff), 0.3) })
    );
    head.position.y = 0.31;

    const grp = new THREE.Group();
    grp.add(body);
    grp.add(head);
    grp.position.set(sx, 0.20, sz);
    scene.add(grp);

    // Glow halo
    const haloTex = makeGlowTex(sq.colorHex);
    const halo = glow(haloTex, 1.1, 0.6);
    halo.position.y = 0.1;
    grp.add(halo);

    // Floor shadow glow
    const fg = glow(makeGlowTex(sq.colorHex), 0.65, 0.18);
    fg.position.set(sx, 0.02, sz);
    scene.add(fg);

    // Raycaster tags
    body.userData.isAgent = true; body.userData.idx = agentObjects.length;
    head.userData.isAgent = true; head.userData.idx = agentObjects.length;

    // Activity particles
    const particles = [];
    if (act > 0.55) {
      for (let p = 0; p < Math.round(act * 4); p++) {
        const ps = glow(makeGlowTex(sq.colorHex), 0.15, 0.85);
        ps.userData.ph = Math.random() * Math.PI * 2;
        ps.userData.sp = 0.2 + Math.random() * 0.3;
        ps.userData.ox = (Math.random()-0.5) * 0.4;
        ps.userData.oz = (Math.random()-0.5) * 0.4;
        grp.add(ps);
        particles.push(ps);
      }
    }

    agentObjects.push({
      grp, body, head, halo, fg, particles,
      agent, squad:sq, act,
      speed: 0.5 + act * 2.0,
      deskX:desk.x, deskZ:desk.z,
      tx:sx, tz:sz,
      wt: Math.random() * 3,
    });
  });
});

// ─── HTML LABELS ──────────────────────────────────────────────────────────────
const labelsDiv = document.createElement('div');
labelsDiv.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:55;';
document.body.appendChild(labelsDiv);

const agentLabelEls = agentObjects.map(ao => {
  const el = document.createElement('div'); el.className = 'agent-label';
  el.innerHTML = `<span class="a-icon">${ao.agent.icon}</span><div class="a-name" style="color:${ao.squad.colorLight}">${ao.agent.name}</div><div class="a-role">${ao.agent.role}</div>`;
  labelsDiv.appendChild(el); return el;
});

const roomLabelEls = SQUADS.map(sq => {
  const el = document.createElement('div'); el.className = 'room-label';
  el.innerHTML = `<div class="r-name" style="color:${sq.colorLight}">${sq.roomName}</div><div class="r-sub" style="color:${sq.colorLight}">${sq.agents.length} agentes</div>`;
  labelsDiv.appendChild(el); return { el, sq };
});

document.getElementById('sv-agents').textContent = SQUADS.reduce((s,q) => s+q.agents.length, 0);
document.getElementById('sv-squads').textContent  = SQUADS.length;

// ─── INTERACTION ──────────────────────────────────────────────────────────────
const raycaster  = new THREE.Raycaster();
const mouse      = new THREE.Vector2(-9999,-9999);
const _v         = new THREE.Vector3();
let   selectedAO = null;
const clickTargets = agentObjects.map(ao => ao.body).concat(agentObjects.map(ao => ao.head));

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  canvas.className = raycaster.intersectObjects(clickTargets).length ? 'hover' : '';
});

canvas.addEventListener('click', e => {
  mouse.x =  (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) openCard(agentObjects[hits[0].object.userData.idx]);
});

function openCard(ao) {
  selectedAO = ao;
  document.getElementById('c-icon').textContent = ao.agent.icon;
  document.getElementById('c-name').textContent = ao.agent.name;
  document.getElementById('c-role').textContent = ao.agent.role;
  document.getElementById('c-desc').textContent = ao.agent.desc;
  const sqEl = document.getElementById('c-squad');
  sqEl.textContent = ao.squad.name;
  sqEl.style.background = ao.squad.colorHex + '22';
  sqEl.style.color       = ao.squad.colorLight;
  sqEl.style.border      = '1px solid ' + ao.squad.colorHex + '44';
  document.getElementById('c-cmds').innerHTML = ao.agent.commands.map(c=>`<span class="cmd-tag">${c}</span>`).join('');
  const pct = Math.round(ao.act * 100);
  const barColor = ao.act < 0.5 ? `hsl(${120-ao.act*60},70%,50%)` : `hsl(${120-ao.act*120},80%,55%)`;
  document.getElementById('c-act-fill').style.width      = pct + '%';
  document.getElementById('c-act-fill').style.background = barColor;
  document.getElementById('c-act-pct').textContent       = pct + '%';
  document.getElementById('info-card').classList.add('open');
}

document.getElementById('close-card').addEventListener('click', () => {
  document.getElementById('info-card').classList.remove('open'); selectedAO = null;
});

// ─── WANDER ───────────────────────────────────────────────────────────────────
function pickTarget(ao) {
  const sq = ao.squad, m = 1.5;
  if (Math.random() < 0.28) {
    ao.tx = ao.deskX; ao.tz = ao.deskZ;
    ao.wt = 2.0 + (1-ao.act)*3.5;
  } else {
    ao.tx = sq.rx + (Math.random()-0.5)*(sq.rw - m*2);
    ao.tz = sq.rz + (Math.random()-0.5)*(sq.rd - m*2);
    ao.wt = 0.6 + (1-ao.act)*2.0 + Math.random()*1.2;
  }
}
agentObjects.forEach(ao => pickTarget(ao));

// ─── COMM PULSES ──────────────────────────────────────────────────────────────
const pulses = [];
let nextPulse = 1.0;

function spawnPulse() {
  const ca = agentObjects.filter(ao => ao.squad.id === 'core');
  const oa = agentObjects.filter(ao => ao.squad.id !== 'core');
  if (!ca.length || !oa.length) return;
  const src = ca[Math.floor(Math.random()*ca.length)];
  const dst = oa[Math.floor(Math.random()*oa.length)];
  const sp = glow(makeGlowTex(src.squad.colorHex), 0.28, 0.95);
  scene.add(sp);
  pulses.push({ sp, src, dst, t:0, dur:0.4 + Math.random()*0.5 });
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta   = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.elapsedTime;

  // Move agents
  agentObjects.forEach((ao, i) => {
    ao.wt -= delta;
    if (ao.wt <= 0) pickTarget(ao);

    const dx = ao.tx - ao.grp.position.x;
    const dz = ao.tz - ao.grp.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > 0.07) {
      const step = Math.min(ao.speed * delta, dist);
      ao.grp.position.x += (dx/dist)*step;
      ao.grp.position.z += (dz/dist)*step;
      ao.grp.rotation.y  = Math.atan2(dx, dz);
    } else {
      ao.wt = 0;
    }

    // Bobble
    const moving = dist > 0.1 ? 1 : 0;
    ao.grp.position.y = 0.20 + moving * Math.abs(Math.sin(elapsed*(2.5+ao.act*5) + i)) * 0.04 * ao.act;

    // Halo breathe
    const breathe = 0.8 + 0.2*Math.sin(elapsed*2 + i*0.8);
    const sel = selectedAO === ao;
    ao.halo.scale.setScalar(1.1 * breathe * (sel ? 2.8 : 1));
    ao.halo.material.opacity = 0.55 * breathe * (sel ? 1.5 : 1);

    // Floor glow follows
    ao.fg.position.x = ao.grp.position.x;
    ao.fg.position.z = ao.grp.position.z;

    // Particles rise
    ao.particles.forEach(ps => {
      const ph = ps.userData.ph + elapsed*ps.userData.sp;
      const rise = (ph*0.25) % 1.3;
      ps.position.set(ps.userData.ox + Math.sin(ph*1.4)*0.14, 0.45+rise, ps.userData.oz + Math.cos(ph)*0.14);
      ps.material.opacity = Math.sin(rise/1.3*Math.PI)*0.75;
    });

    // Label
    _v.setFromMatrixPosition(ao.grp.matrixWorld); _v.y += 0.85; _v.project(camera);
    if (Math.abs(_v.x)>1.25 || Math.abs(_v.y)>1.25 || _v.z>1) { agentLabelEls[i].style.opacity='0'; }
    else {
      agentLabelEls[i].style.opacity='1';
      agentLabelEls[i].style.left=((_v.x*.5+.5)*innerWidth)+'px';
      agentLabelEls[i].style.top =((-_v.y*.5+.5)*innerHeight)+'px';
    }
  });

  // Room labels
  roomLabelEls.forEach(({ el, sq }) => {
    _v.set(sq.rx, 0.3, sq.rz); _v.project(camera);
    if (Math.abs(_v.x)>1.25 || Math.abs(_v.y)>1.25 || _v.z>1) { el.style.opacity='0'; return; }
    el.style.opacity='1';
    el.style.left=((_v.x*.5+.5)*innerWidth)+'px';
    el.style.top =((-_v.y*.5+.5)*innerHeight+22)+'px';
  });

  // Comm pulses
  nextPulse -= delta;
  if (nextPulse <= 0) { spawnPulse(); nextPulse = 0.8 + Math.random()*1.8; }
  for (let i = pulses.length-1; i >= 0; i--) {
    const p = pulses[i]; p.t += delta/p.dur;
    if (p.t >= 1) { scene.remove(p.sp); pulses.splice(i,1); continue; }
    const sp = p.src.grp.position, dp = p.dst.grp.position;
    p.sp.position.set(sp.x+(dp.x-sp.x)*p.t, sp.y+(dp.y-sp.y)*p.t+Math.sin(p.t*Math.PI)*2.0, sp.z+(dp.z-sp.z)*p.t);
    p.sp.material.opacity = Math.sin(p.t*Math.PI)*0.9;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
