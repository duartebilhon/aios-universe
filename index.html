<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS — Universo de Agentes IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000410;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    canvas { display: block; }

    /* ---- HEADER ---- */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 100;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,4,16,0.9) 0%, transparent 100%);
    }
    #header h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ffffff 0%, #88aaff 50%, #aa66ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #header .subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-top: 4px;
    }
    #header .powered {
      text-align: right;
    }
    #header .powered .label {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
    #header .powered .brand {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }

    /* ---- AGENT LABELS ---- */
    .agent-label {
      position: fixed;
      pointer-events: none;
      text-align: center;
      transform: translate(-50%, -130%);
      z-index: 50;
      transition: opacity 0.4s;
    }
    .agent-label .a-icon {
      font-size: 16px;
      display: block;
      margin-bottom: 2px;
    }
    .agent-label .a-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .agent-label .a-role {
      font-size: 9px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ---- SQUAD LABELS ---- */
    .squad-label {
      position: fixed;
      pointer-events: none;
      text-align: center;
      transform: translate(-50%, -200%);
      z-index: 50;
      transition: opacity 0.4s;
    }
    .squad-label .s-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.7;
    }

    /* ---- INFO CARD ---- */
    #info-card {
      position: fixed;
      right: -400px;
      top: 50%;
      transform: translateY(-50%);
      width: 340px;
      background: rgba(5, 10, 30, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(120, 160, 255, 0.15);
      border-radius: 20px;
      padding: 32px;
      z-index: 200;
      transition: right 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #info-card.open { right: 32px; }

    #info-card .c-icon { font-size: 44px; margin-bottom: 14px; display: block; }
    #info-card .c-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    #info-card .c-role {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 14px;
    }
    #info-card .c-squad {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 22px;
    }
    #info-card .c-desc {
      font-size: 13px;
      line-height: 1.8;
      color: rgba(255,255,255,0.65);
      margin-bottom: 22px;
    }
    #info-card .c-cmds-title {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
    }
    #info-card .cmd-tag {
      display: inline-block;
      background: rgba(100, 150, 255, 0.1);
      border: 1px solid rgba(100,150,255,0.2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      margin: 3px;
      color: #88ccff;
    }
    #close-card {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #close-card:hover {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    /* ---- STATS BAR ---- */
    #stats {
      position: fixed;
      bottom: 30px;
      left: 40px;
      display: flex;
      gap: 32px;
      pointer-events: none;
    }
    .stat {
      text-align: left;
    }
    .stat .val {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(90deg, #88aaff, #aa66ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat .key {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ---- HINT ---- */
    #hint {
      position: fixed;
      bottom: 30px;
      right: 40px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      pointer-events: none;
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    /* ---- CURSOR ---- */
    body { cursor: default; }
    canvas { cursor: grab; }
    canvas:active { cursor: grabbing; }
    canvas.hover { cursor: pointer; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="header">
  <div>
    <h1>AIOS</h1>
    <div class="subtitle">Universe of Intelligent Agents</div>
  </div>
  <div class="powered">
    <div class="label">Powered by</div>
    <div class="brand">ProCustomer AI</div>
  </div>
</div>

<div id="info-card">
  <button id="close-card">✕</button>
  <span class="c-icon" id="c-icon">🤖</span>
  <div class="c-name" id="c-name">—</div>
  <div class="c-role" id="c-role">—</div>
  <span class="c-squad" id="c-squad">Squad</span>
  <div class="c-desc" id="c-desc">—</div>
  <div class="c-cmds-title">Invocar agente</div>
  <div id="c-cmds"></div>
</div>

<div id="stats">
  <div class="stat">
    <div class="val" id="stat-agents">11</div>
    <div class="key">Agentes</div>
  </div>
  <div class="stat">
    <div class="val" id="stat-squads">2</div>
    <div class="key">Squads</div>
  </div>
  <div class="stat">
    <div class="val">24/7</div>
    <div class="key">Disponível</div>
  </div>
</div>

<div id="hint">Clique num agente · Scroll zoom · Arraste órbita</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============================================================
//  DATA
// ============================================================
const SQUADS = [
  {
    id: 'comercial',
    name: 'Time Comercial',
    subtitle: 'CoHort Sales Squad',
    position: { x: -9, y: 0, z: 0 },
    color: 0x2266ff,
    colorHex: '#2266ff',
    colorLight: '#6699ff',
    agents: [
      { name: 'Duarte',   role: 'Head Comercial',    icon: '👔', desc: 'Orquestra toda a operação comercial. Define estratégia, metas e lidera o time de vendas high ticket.', commands: ['/agents:head-comercial'] },
      { name: 'Mariana',  role: 'Closer',             icon: '💎', desc: 'Especialista em fechamento de contratos high ticket. Converte leads qualificados em clientes.', commands: ['/agents:closer'] },
      { name: 'Taise',    role: 'SDR',                icon: '📡', desc: 'Prospecção ativa e qualificação de leads. Aquece o pipeline e agenda reuniões estratégicas.', commands: ['/agents:sdr'] },
      { name: 'Taynara',  role: 'Customer Success',   icon: '🌟', desc: 'Garante satisfação e retenção pós-venda. Gerencia onboarding e expansão de contas.', commands: ['/agents:cs-pos-venda'] },
      { name: 'Letícia',  role: 'Copywriter',         icon: '✍️', desc: 'Cria copy de vendas persuasivo para todos os canais: e-mail, WhatsApp, landing pages e anúncios.', commands: ['/agents:copywriter-vendas'] },
      { name: 'Peçanha',  role: 'Analista de Dados',  icon: '📊', desc: 'Analisa métricas do funil, gera relatórios e fornece insights para otimização da operação.', commands: ['/agents:analista-vendas'] },
    ]
  },
  {
    id: 'content',
    name: 'Content Creator',
    subtitle: 'Creative Production Squad',
    position: { x: 9, y: 1, z: -2 },
    color: 0xaa22ee,
    colorHex: '#aa22ee',
    colorLight: '#cc66ff',
    agents: [
      { name: 'Marco',   role: 'Estrategista',        icon: '🎯', desc: 'Define estratégia de conteúdo: temas, calendário editorial e posicionamento da marca nos canais digitais.', commands: ['/agents:estrategista-conteudo'] },
      { name: 'Luna',    role: 'Roteirista',           icon: '🎬', desc: 'Escreve roteiros para vídeos, reels e apresentações com narrativa envolvente e storytelling.', commands: ['/agents:roteirista'] },
      { name: 'Pixel',   role: 'Produtor Vídeo IA',   icon: '🎥', desc: 'Produz vídeos com HeyGen + Runway. Avatares IA, motion e edição totalmente automatizada.', commands: ['/agents:produtor-video-ia'] },
      { name: 'Forma',   role: 'Adaptador',            icon: '🔄', desc: 'Adapta cada conteúdo para Instagram, TikTok e LinkedIn com formato nativo de cada plataforma.', commands: ['/agents:adaptador-conteudo'] },
      { name: 'Cronos',  role: 'Publicador',           icon: '⏰', desc: 'Agenda e publica conteúdo nos melhores horários em todas as plataformas automaticamente.', commands: ['/agents:publicador'] },
    ]
  }
];

// ============================================================
//  SCENE SETUP
// ============================================================
const canvas = document.getElementById('c');
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000410);
scene.fog = new THREE.FogExp2(0x000410, 0.008);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 7, 24);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.04;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.12;
controls.minDistance     = 6;
controls.maxDistance     = 55;
controls.maxPolarAngle   = Math.PI * 0.82;

// ============================================================
//  HELPERS
// ============================================================
function makeGlowTexture(hexColor) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const col = new THREE.Color(hexColor);
  const r = Math.round(col.r * 255);
  const g = Math.round(col.g * 255);
  const b = Math.round(col.b * 255);
  const grad = ctx.createRadialGradient(64,64,0, 64,64,64);
  grad.addColorStop(0,   `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.25,`rgba(${r},${g},${b},0.6)`);
  grad.addColorStop(0.6, `rgba(${r},${g},${b},0.15)`);
  grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}

function makeSprite(tex, scale, opacity, blending) {
  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    opacity,
    blending: blending || THREE.AdditiveBlending,
    depthWrite: false
  });
  const s = new THREE.Sprite(mat);
  s.scale.setScalar(scale);
  return s;
}

// ============================================================
//  STARFIELD
// ============================================================
(function buildStars() {
  const N = 4000;
  const pos   = new Float32Array(N * 3);
  const col   = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random()-0.5)*240;
    pos[i*3+1] = (Math.random()-0.5)*240;
    pos[i*3+2] = (Math.random()-0.5)*240;
    const v = 0.5 + Math.random()*0.5;
    col[i*3]   = v * (0.7+Math.random()*0.3);
    col[i*3+1] = v * (0.7+Math.random()*0.3);
    col[i*3+2] = v;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.85 });
  scene.add(new THREE.Points(geo, mat));
})();

// ============================================================
//  NEBULA CLOUDS
// ============================================================
function buildNebula(cx, cy, cz, hexColor, count, radius) {
  const N = count;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const c   = new THREE.Color(hexColor);
  for (let i = 0; i < N; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2*Math.random()-1);
    const r     = Math.pow(Math.random(), 0.4) * radius;
    pos[i*3]   = cx + r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = cy + r * Math.sin(phi) * Math.sin(theta) * 0.35;
    pos[i*3+2] = cz + r * Math.cos(phi);
    const br = 0.2 + Math.random() * 0.6;
    col[i*3]   = c.r * br;
    col[i*3+1] = c.g * br;
    col[i*3+2] = c.b * br;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size: 0.35, vertexColors: true, transparent: true, opacity: 0.22, sizeAttenuation: true });
  scene.add(new THREE.Points(geo, mat));
}

buildNebula(-9,  1,  0,  '#1133cc', 700, 8);
buildNebula( 9,  1, -2,  '#771199', 700, 8);
buildNebula( 0, -4, -12, '#112244', 400, 9);
buildNebula( 1,  6,  5,  '#220066', 300, 6);

// ============================================================
//  GALAXY CORES
// ============================================================
const squadMeshes = {};

SQUADS.forEach(sq => {
  const group = new THREE.Group();
  group.position.set(sq.position.x, sq.position.y, sq.position.z);

  // Inner core
  const coreMat = new THREE.MeshBasicMaterial({ color: sq.color });
  const core    = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), coreMat);
  group.add(core);

  // Glow layers
  const tex = makeGlowTexture(sq.colorHex);
  group.add(makeSprite(tex, 6, 0.55));
  group.add(makeSprite(tex, 12, 0.18));

  // Orbital ring
  const ringGeo = new THREE.RingGeometry(2.6, 2.72, 80);
  const ringMat = new THREE.MeshBasicMaterial({ color: sq.color, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2 + (Math.random()-0.5)*0.25;
  ring.rotation.z = (Math.random()-0.5)*0.2;
  group.add(ring);

  // Second ring (tilted)
  const ring2 = ring.clone();
  ring2.rotation.x = Math.PI * 0.35;
  ring2.rotation.y = Math.PI * 0.2;
  ring2.material = ring2.material.clone();
  ring2.material.opacity = 0.06;
  group.add(ring2);

  scene.add(group);
  squadMeshes[sq.id] = group;
});

// ============================================================
//  AGENT NODES
// ============================================================
const agentObjects = [];

SQUADS.forEach(sq => {
  const n = sq.agents.length;
  sq.agents.forEach((agent, i) => {
    const orbitRadius = 2.5 + (i % 3) * 0.7;
    const orbitPhase  = (i / n) * Math.PI * 2;
    const orbitSpeed  = 0.07 + (i * 0.013);
    const orbitHeight = (Math.random()-0.5) * 1.4;
    const orbitTilt   = (Math.random()-0.5) * 0.5;

    // Compute initial position
    const initX = sq.position.x + Math.cos(orbitPhase) * orbitRadius;
    const initY = sq.position.y + orbitHeight;
    const initZ = sq.position.z + Math.sin(orbitPhase) * orbitRadius;

    // Node group
    const group = new THREE.Group();
    group.position.set(initX, initY, initZ);

    // Core sphere
    const agentCol = new THREE.Color(sq.color).lerp(new THREE.Color(0xffffff), 0.35);
    const sphere   = new THREE.Mesh(
      new THREE.SphereGeometry(0.16, 12, 12),
      new THREE.MeshBasicMaterial({ color: agentCol })
    );
    sphere.userData.isAgent = true;
    sphere.userData.idx = agentObjects.length;
    group.add(sphere);

    // Glow
    const agentHex = '#' + agentCol.getHexString();
    const glowTex  = makeGlowTexture(agentHex);
    const glow     = makeSprite(glowTex, 1.1, 0.75);
    group.add(glow);

    scene.add(group);

    // Connection line (core → agent)
    const lineGeo = new THREE.BufferGeometry();
    const linePos = new Float32Array([
      sq.position.x, sq.position.y, sq.position.z,
      initX, initY, initZ
    ]);
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
    const lineMat = new THREE.LineBasicMaterial({ color: sq.color, transparent: true, opacity: 0.12 });
    const line    = new THREE.Line(lineGeo, lineMat);
    scene.add(line);

    // Pulse sprite
    const pulseTex = makeGlowTexture(sq.colorHex);
    const pulse    = makeSprite(pulseTex, 0.28, 0.0);
    scene.add(pulse);

    agentObjects.push({
      group, sphere, glow, line, pulse,
      agent, squad: sq,
      orbitPhase, orbitRadius, orbitSpeed, orbitHeight, orbitTilt,
      pulseT: Math.random(),
      squadPos: sq.position
    });
  });
});

// ============================================================
//  HTML LABELS
// ============================================================
const labelsDiv = document.createElement('div');
labelsDiv.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:55;';
document.body.appendChild(labelsDiv);

const agentLabels = agentObjects.map(ao => {
  const el = document.createElement('div');
  el.className = 'agent-label';
  el.innerHTML = `<span class="a-icon">${ao.agent.icon}</span><div class="a-name" style="color:${ao.squad.colorLight}">${ao.agent.name}</div><div class="a-role">${ao.agent.role}</div>`;
  labelsDiv.appendChild(el);
  return el;
});

const squadLabelEls = SQUADS.map(sq => {
  const el = document.createElement('div');
  el.className = 'squad-label';
  el.innerHTML = `<div class="s-name" style="color:${sq.colorLight}">${sq.name}</div>`;
  labelsDiv.appendChild(el);
  return { el, sq };
});

// ============================================================
//  PROJECT 3D → SCREEN
// ============================================================
const _v = new THREE.Vector3();

function projectTo2D(object3D) {
  _v.setFromMatrixPosition(object3D.matrixWorld);
  _v.project(camera);
  if (Math.abs(_v.x) > 1.3 || Math.abs(_v.y) > 1.3 || _v.z > 1) return null;
  return {
    x: (_v.x * 0.5 + 0.5) * innerWidth,
    y: (-_v.y * 0.5 + 0.5) * innerHeight
  };
}

function placeLabel(el, p, extraY = 0) {
  if (!p) { el.style.opacity = '0'; return; }
  el.style.opacity = '1';
  el.style.left = p.x + 'px';
  el.style.top  = (p.y + extraY) + 'px';
}

// ============================================================
//  RAYCASTER / INTERACTION
// ============================================================
const raycaster   = new THREE.Raycaster();
const mouse       = new THREE.Vector2(-9999, -9999);
let   selectedAO  = null;

const clickTargets = agentObjects.map(ao => ao.sphere);

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  canvas.className = hits.length ? 'hover' : '';
});

canvas.addEventListener('click', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) {
    openCard(agentObjects[hits[0].object.userData.idx]);
  }
});

// ============================================================
//  INFO CARD
// ============================================================
function openCard(ao) {
  selectedAO = ao;
  document.getElementById('c-icon').textContent  = ao.agent.icon;
  document.getElementById('c-name').textContent  = ao.agent.name;
  document.getElementById('c-role').textContent  = ao.agent.role;
  document.getElementById('c-desc').textContent  = ao.agent.desc;
  const sqEl = document.getElementById('c-squad');
  sqEl.textContent       = ao.squad.name;
  sqEl.style.background  = ao.squad.colorHex + '22';
  sqEl.style.color       = ao.squad.colorLight;
  sqEl.style.border      = '1px solid ' + ao.squad.colorHex + '44';
  document.getElementById('c-cmds').innerHTML =
    ao.agent.commands.map(c => `<span class="cmd-tag">${c}</span>`).join('');
  document.getElementById('info-card').classList.add('open');
}

document.getElementById('close-card').addEventListener('click', () => {
  document.getElementById('info-card').classList.remove('open');
  selectedAO = null;
});

// ============================================================
//  ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  agentObjects.forEach((ao, i) => {
    // Orbit
    const angle = ao.orbitPhase + t * ao.orbitSpeed;
    const x = ao.squadPos.x + Math.cos(angle) * ao.orbitRadius;
    const y = ao.squadPos.y + ao.orbitHeight + Math.sin(t * 0.28 + i * 1.1) * 0.18;
    const z = ao.squadPos.z + Math.sin(angle) * ao.orbitRadius;
    ao.group.position.set(x, y, z);

    // Breathing glow
    const breathe = 0.85 + 0.15 * Math.sin(t * 1.5 + i * 0.9);
    ao.glow.scale.setScalar(1.1 * breathe * (selectedAO === ao ? 2.2 : 1));

    // Update connection line
    const lp = ao.line.geometry.attributes.position.array;
    lp[0] = ao.squadPos.x; lp[1] = ao.squadPos.y; lp[2] = ao.squadPos.z;
    lp[3] = x;             lp[4] = y;             lp[5] = z;
    ao.line.geometry.attributes.position.needsUpdate = true;

    // Pulse along line
    ao.pulseT = (ao.pulseT + 0.004) % 1;
    const p = ao.pulseT;
    ao.pulse.position.set(
      ao.squadPos.x + (x - ao.squadPos.x) * p,
      ao.squadPos.y + (y - ao.squadPos.y) * p,
      ao.squadPos.z + (z - ao.squadPos.z) * p
    );
    ao.pulse.material.opacity = Math.sin(p * Math.PI) * 0.65;

    // Labels
    const screen = projectTo2D(ao.group);
    placeLabel(agentLabels[i], screen);
  });

  // Squad core slow rotation
  SQUADS.forEach((sq, si) => {
    const mesh = squadMeshes[sq.id];
    if (mesh) {
      mesh.children[0].rotation.y = t * 0.4;
      const screen = projectTo2D(mesh.children[0]);
      placeLabel(squadLabelEls[si].el, screen, -10);
    }
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ============================================================
//  RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
