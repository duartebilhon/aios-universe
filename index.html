<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS — Universo de Agentes IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000308; overflow:hidden; font-family:'Inter',sans-serif; color:#fff; }
    canvas { display:block; }

    /* HEADER */
    #header {
      position:fixed; top:0; left:0; right:0;
      padding:22px 36px;
      display:flex; justify-content:space-between; align-items:flex-start;
      z-index:100; pointer-events:none;
      background:linear-gradient(to bottom,rgba(0,3,8,.92) 0%,transparent 100%);
    }
    #header h1 {
      font-size:24px; font-weight:900; letter-spacing:6px; text-transform:uppercase;
      background:linear-gradient(90deg,#fff 0%,#88aaff 50%,#cc66ff 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    #header .subtitle { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,.3); text-transform:uppercase; margin-top:4px; }
    #header .powered { text-align:right; }
    #header .powered .lbl  { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,.22); text-transform:uppercase; }
    #header .powered .brand{ font-size:13px; font-weight:700; color:rgba(255,255,255,.5); }

    /* LABELS */
    .agent-label {
      position:fixed; pointer-events:none; text-align:center;
      transform:translate(-50%,-140%); z-index:50; transition:opacity .35s;
    }
    .agent-label .a-icon { font-size:13px; display:block; margin-bottom:1px; }
    .agent-label .a-name { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; white-space:nowrap; }
    .agent-label .a-role { font-size:8px; color:rgba(255,255,255,.38); letter-spacing:.5px; white-space:nowrap; }
    .squad-label {
      position:fixed; pointer-events:none; text-align:center;
      transform:translate(-50%,-220%); z-index:50; transition:opacity .35s;
    }
    .squad-label .s-name { font-size:10px; font-weight:700; letter-spacing:4px; text-transform:uppercase; white-space:nowrap; opacity:.6; }

    /* INFO CARD */
    #info-card {
      position:fixed; right:-400px; top:50%; transform:translateY(-50%);
      width:330px;
      background:rgba(4,8,28,.9); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
      border:1px solid rgba(120,160,255,.13); border-radius:20px;
      padding:30px; z-index:200;
      transition:right .5s cubic-bezier(.25,.46,.45,.94);
    }
    #info-card.open { right:28px; }
    #info-card .c-icon  { font-size:42px; margin-bottom:12px; display:block; }
    #info-card .c-name  { font-size:24px; font-weight:800; margin-bottom:3px; }
    #info-card .c-role  { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.38); margin-bottom:13px; }
    #info-card .c-squad { display:inline-block; padding:4px 13px; border-radius:20px; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:20px; }
    #info-card .c-desc  { font-size:12.5px; line-height:1.8; color:rgba(255,255,255,.62); margin-bottom:20px; }
    #info-card .c-cmds-title { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.28); margin-bottom:9px; }
    .cmd-tag { display:inline-block; background:rgba(100,150,255,.1); border:1px solid rgba(100,150,255,.18); border-radius:6px; padding:4px 10px; font-size:10px; font-family:monospace; margin:3px; color:#88ccff; }
    #close-card { position:absolute; top:14px; right:14px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.55); width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; }
    #close-card:hover { background:rgba(255,255,255,.14); color:#fff; }

    /* STATS */
    #stats { position:fixed; bottom:28px; left:36px; display:flex; gap:28px; pointer-events:none; }
    .stat .val { font-size:20px; font-weight:800; background:linear-gradient(90deg,#88aaff,#cc66ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .stat .key { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.28); }

    /* MOTION PANEL */
    #motion-panel {
      position:fixed; left:36px; bottom:82px;
      background:rgba(4,8,28,.82); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(120,160,255,.12); border-radius:14px;
      padding:16px 20px; z-index:150; width:240px;
    }
    .mp-title { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.3); margin-bottom:12px; }
    .mp-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .mp-row:last-child { margin-bottom:0; }
    .mp-label { font-size:10px; color:rgba(255,255,255,.45); width:68px; flex-shrink:0; }
    .mp-val   { font-size:10px; color:rgba(255,255,255,.35); width:28px; text-align:right; flex-shrink:0; }
    input[type=range] { flex:1; height:3px; appearance:none; -webkit-appearance:none; background:rgba(255,255,255,.12); border-radius:2px; outline:none; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#6699ff; cursor:pointer; }
    input[type=range]:hover::-webkit-slider-thumb { background:#aabbff; }

    /* MODE TOGGLE */
    #mode-toggle {
      position:fixed; bottom:88px; right:36px;
      background:rgba(4,8,28,.82); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(120,160,255,.15); border-radius:40px;
      padding:6px; display:flex; gap:6px; z-index:150;
    }
    .mode-btn {
      width:40px; height:40px; border-radius:50%; border:none; cursor:pointer;
      font-size:18px; display:flex; align-items:center; justify-content:center;
      background:transparent; color:rgba(255,255,255,.4);
      transition:background .2s, color .2s;
    }
    .mode-btn.active { background:rgba(100,150,255,.2); color:#fff; }
    .mode-btn:hover  { background:rgba(255,255,255,.1); color:#fff; }
    .mode-label {
      position:fixed; bottom:136px; right:36px;
      font-size:9px; letter-spacing:2px; text-transform:uppercase;
      color:rgba(255,255,255,.25); text-align:center; pointer-events:none;
      width:92px;
    }

    /* HINT */
    #hint { position:fixed; bottom:28px; right:36px; font-size:9px; letter-spacing:2px; color:rgba(255,255,255,.18); text-transform:uppercase; pointer-events:none; animation:blink 5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.18} 50%{opacity:.55} }

    canvas { cursor:grab; }
    canvas:active { cursor:grabbing; }
    canvas.hover  { cursor:pointer; }
    canvas.pan    { cursor:move; }
    canvas.pan:active { cursor:move; }
  </style>
</head>

//  SCENE
// ═══════════════════════════════════════════════════════════════
const canvas   = document.getElementById('c');
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x000308);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 800);
camera.position.set(0, 10, 30);

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;

// ── Bloom Post-processing ──────────────────────────────────────
const composer    = new THREE.EffectComposer(renderer);
const renderPass  = new THREE.RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new THREE.UnrealBloomPass(

  1.8,   // strength
  0.5,   // radius
  0.1    // threshold — glow anything brighter than this
);
composer.addPass(bloomPass);

// ── Controls ──────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.04;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.1;
controls.minDistance     = 1;
controls.maxDistance     = 200;
controls.maxPolarAngle   = Math.PI * .88;

// ═══════════════════════════════════════════════════════════════
//  CURSOR MODE TOGGLE
// ═══════════════════════════════════════════════════════════════
let panMode = false;

function setMode(pan) {
  panMode = pan;

    controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };

const motion = { horiz:1, vert:1, speed:1 };

// ═══════════════════════════════════════════════════════════════
//  TEXTURE HELPERS
// ═══════════════════════════════════════════════════════════════
function makeGlowTex(hexColor, size=128) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,size,size);
  const h = size/2;
  const col = new THREE.Color(hexColor);
  const r = Math.round(col.r*255), g = Math.round(col.g*255), b = Math.round(col.b*255);
  const gr = ctx.createRadialGradient(h,h,0, h,h,h);
  gr.addColorStop(0,   `rgba(${r},${g},${b},1)`);
  gr.addColorStop(0.15,`rgba(${r},${g},${b},0.85)`);
  gr.addColorStop(0.4, `rgba(${r},${g},${b},0.3)`);
  gr.addColorStop(0.7, `rgba(${r},${g},${b},0.06)`);
  gr.addColorStop(1,   `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = gr;
  ctx.fillRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(c);
  tex.premultiplyAlpha = false;
  return tex;
}

function makeSpriteTex(size=32) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,size,size);
  const h = size/2;
  const gr = ctx.createRadialGradient(h,h,0, h,h,h);
  gr.addColorStop(0,  'rgba(255,255,255,1)');
  gr.addColorStop(.4, 'rgba(255,255,255,.6)');
  gr.addColorStop(1,  'rgba(255,255,255,0)');
  ctx.fillStyle = gr; ctx.fillRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(c);
  tex.premultiplyAlpha = false;
  return tex;
}

function glowSprite(tex, scale, opacity) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({
    map:tex, transparent:true, opacity,
    blending:THREE.AdditiveBlending,
    depthWrite:false, depthTest:false, alphaTest:.001
  }));
  s.scale.setScalar(scale);
  return s;
}

{

    col[i*3]=v*(.5+Math.random()*.5); col[i*3+1]=v*(.5+Math.random()*.5); col[i*3+2]=v;

  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',   new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size:.5, map:starTex, vertexColors:true, transparent:true, opacity:.9,
    blending:THREE.AdditiveBlending, depthWrite:false, alphaTest:.005, sizeAttenuation:true
  })));
}

// ═══════════════════════════════════════════════════════════════
//  NEBULAE
// ═══════════════════════════════════════════════════════════════
function nebula(cx,cy,cz,hex,n,rad) {
  const pos=new Float32Array(n*3),col=new Float32Array(n*3),c=new THREE.Color(hex);
  for(let i=0;i<n;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=Math.pow(Math.random(),.35)*rad;
    pos[i*3]=cx+r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=cy+r*Math.sin(ph)*Math.sin(th)*.3; pos[i*3+2]=cz+r*Math.cos(ph);
    const br=.15+Math.random()*.55;
    col[i*3]=c.r*br; col[i*3+1]=c.g*br; col[i*3+2]=c.b*br;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',   new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({size:.35,vertexColors:true,transparent:true,opacity:.22,sizeAttenuation:true,depthWrite:false})));
}
nebula(  0, 0,  0,'#cc8800',700, 6);
nebula(-11, 1, -3,'#1133cc',800, 9);
nebula( 11,-1, -4,'#771199',800, 9);
nebula(  2, 3, 12,'#116644',600, 8);
nebula( -4,-2, 11,'#991144',600, 8);
nebula(  0,-8,-14,'#112244',400,10);
nebula(  6, 8, -8,'#220066',300, 7);

// ═══════════════════════════════════════════════════════════════
//  SQUAD CORES
// ═══════════════════════════════════════════════════════════════
const squadCoreGroups = {};
SQUADS.forEach(sq => {
  const g = new THREE.Group();
  g.position.set(sq.position.x, sq.position.y, sq.position.z);

  // Bright core — bloom will make it glow brilliantly
  const sz = sq.coreSize||.4;
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(sz,20,20),
    new THREE.MeshBasicMaterial({ color: sq.color })
  );
  g.add(core);

  const t = makeGlowTex(sq.colorHex, 256);
  g.add(glowSprite(t, 7,   .7));
  g.add(glowSprite(t, 16,  .25));
  g.add(glowSprite(t, 30,  .08));

  for(let k=0;k<3;k++){
    const rg=new THREE.RingGeometry(2.4+k*.4,2.5+k*.4,80);
    const rm=new THREE.MeshBasicMaterial({color:sq.color,transparent:true,opacity:.07-k*.01,side:THREE.DoubleSide,depthWrite:false});
    const ring=new THREE.Mesh(rg,rm);
    ring.rotation.x=Math.PI/2+(Math.random()-.5)*.5+k*.3;
    ring.rotation.z=(Math.random()-.5)*.4+k*.2;
    g.add(ring);
  }
  scene.add(g);
  squadCoreGroups[sq.id] = g;
});

// ═══════════════════════════════════════════════════════════════
//  AGENTS
// ═══════════════════════════════════════════════════════════════
const agentObjects = [];
const agentMap = {};

SQUADS.forEach(sq => {
  const n = sq.agents.length;
  sq.agents.forEach((agent,i) => {
    const orbitRadius  = 2.4+(i%3)*.75;
    const orbitPhase   = (i/n)*Math.PI*2+Math.random()*.5;
    const orbitSpeed   = .09+i*.015+Math.random()*.02;
    const inclination  = (Math.random()-.5)*Math.PI*.9;

    // Drift — higher base frequencies for visible movement
    const driftAmp  = 1.0 + Math.random() * 0.8;
    const driftFX   = 0.18 + Math.random() * 0.22;
    const driftFY   = 0.15 + Math.random() * 0.20;
    const driftFZ   = 0.20 + Math.random() * 0.18;
    const driftPX   = Math.random()*Math.PI*2;
    const driftPY   = Math.random()*Math.PI*2;
    const driftPZ   = Math.random()*Math.PI*2;

    const initX = sq.position.x+Math.cos(orbitPhase)*orbitRadius;
    const initY = sq.position.y+Math.sin(orbitPhase)*orbitRadius*Math.sin(inclination);
    const initZ = sq.position.z+Math.sin(orbitPhase)*orbitRadius*Math.cos(inclination);

    const group = new THREE.Group();
    group.position.set(initX, initY, initZ);

    const agentCol = new THREE.Color(sq.color).lerp(new THREE.Color(0xffffff), .35);
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(.16,12,12),
      new THREE.MeshBasicMaterial({ color: agentCol })
    );
    sphere.userData.isAgent = true;
    sphere.userData.idx = agentObjects.length;
    group.add(sphere);

    const gt = makeGlowTex('#'+agentCol.getHexString(), 128);
    group.add(glowSprite(gt, 1.0, .9));
    group.add(glowSprite(gt, 2.0, .35));
    scene.add(group);

    // Line
    const lp = new Float32Array([sq.position.x,sq.position.y,sq.position.z, initX,initY,initZ]);
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.BufferAttribute(lp,3));
    const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({color:sq.color,transparent:true,opacity:.12,depthWrite:false}));
    scene.add(line);

    // Pulse
    const pulse = glowSprite(makeGlowTex(sq.colorHex,64), .3, 0);
    scene.add(pulse);

    const ao = {
      group, sphere, line, pulse, agent, squad:sq,
      orbitPhase, orbitRadius, orbitSpeed, inclination,
      driftAmp, driftFX, driftFY, driftFZ, driftPX, driftPY, driftPZ,
      pulseT: Math.random(), squadPos: sq.position
    };
    agentObjects.push(ao);
    agentMap[`${sq.id}:${agent.name}`] = ao;
  });
});

// ═══════════════════════════════════════════════════════════════
//  BRIDGE LINES
// ═══════════════════════════════════════════════════════════════
const bridgeLines = [];
BRIDGES.forEach(b => {
  const lp = new Float32Array(6);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(lp,3));
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({color:0x334466,transparent:true,opacity:.08,depthWrite:false}));
  scene.add(line);
  bridgeLines.push({line,from:b.from,to:b.to});
});

// ═══════════════════════════════════════════════════════════════
//  HTML LABELS
// ═══════════════════════════════════════════════════════════════
const labelsDiv = document.createElement('div');
labelsDiv.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:55;';
document.body.appendChild(labelsDiv);

const agentLabelEls = agentObjects.map(ao => {
  const el = document.createElement('div');
  el.className = 'agent-label';
  el.innerHTML = `<span class="a-icon">${ao.agent.icon}</span><div class="a-name" style="color:${ao.squad.colorLight}">${ao.agent.name}</div><div class="a-role">${ao.agent.role}</div>`;
  labelsDiv.appendChild(el);
  return el;
});

const squadLabelEls = SQUADS.map(sq => {
  const el = document.createElement('div');
  el.className = 'squad-label';
  el.innerHTML = `<div class="s-name" style="color:${sq.colorLight}">${sq.name}</div>`;
  labelsDiv.appendChild(el);
  return {el,sq};
});

const totalAgents = SQUADS.reduce((s,q)=>s+q.agents.length,0);
document.getElementById('sv-agents').textContent = totalAgents;
document.getElementById('sv-squads').textContent = SQUADS.length;

// ═══════════════════════════════════════════════════════════════
//  RAYCASTER
// ═══════════════════════════════════════════════════════════════
const raycaster   = new THREE.Raycaster();
const mouse       = new THREE.Vector2(-9999,-9999);
let   selectedAO  = null;
const clickTargets = agentObjects.map(ao=>ao.sphere);

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  if (!panMode) {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(clickTargets);
    canvas.classList.toggle('hover', hits.length > 0);
  }
});

canvas.addEventListener('click', e => {
  if (panMode) return;
  mouse.x =  (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) openCard(agentObjects[hits[0].object.userData.idx]);
});

function openCard(ao) {
  selectedAO = ao;
  document.getElementById('c-icon').textContent = ao.agent.icon;
  document.getElementById('c-name').textContent = ao.agent.name;
  document.getElementById('c-role').textContent = ao.agent.role;
  document.getElementById('c-desc').textContent = ao.agent.desc;
  const sqEl = document.getElementById('c-squad');
  sqEl.textContent      = ao.squad.name;
  sqEl.style.background = ao.squad.colorHex+'22';
  sqEl.style.color      = ao.squad.colorLight;
  sqEl.style.border     = '1px solid '+ao.squad.colorHex+'44';
  document.getElementById('c-cmds').innerHTML = ao.agent.commands.map(c=>`<span class="cmd-tag">${c}</span>`).join('');
  document.getElementById('info-card').classList.add('open');
}
document.getElementById('close-card').addEventListener('click', () => {
  document.getElementById('info-card').classList.remove('open');
  selectedAO = null;
});

// ═══════════════════════════════════════════════════════════════
//  LABEL PROJECTION
// ═══════════════════════════════════════════════════════════════
const _v = new THREE.Vector3();
function placeLabel(el, obj3d, extraY=0) {
  _v.setFromMatrixPosition(obj3d.matrixWorld);
  _v.project(camera);
  if (Math.abs(_v.x)>1.25||Math.abs(_v.y)>1.25||_v.z>1){el.style.opacity='0';return;}
  el.style.opacity='1';
  el.style.left=((_v.x*.5+.5)*innerWidth)+'px';
  el.style.top =((-_v.y*.5+.5)*innerHeight+extraY)+'px';
}

// ═══════════════════════════════════════════════════════════════
//  ANIMATE
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const spd = motion.speed;

  agentObjects.forEach((ao,i) => {
    const angle = ao.orbitPhase + t * ao.orbitSpeed * spd;

    // Orbital component
    const ox = Math.cos(angle) * ao.orbitRadius;
    const oy = Math.sin(angle) * ao.orbitRadius * Math.sin(ao.inclination);
    const oz = Math.sin(angle) * ao.orbitRadius * Math.cos(ao.inclination);

    // Drift — sinusoidal in all axes, driven by sliders
    const dx = Math.sin(t * ao.driftFX * spd + ao.driftPX) * ao.driftAmp * motion.horiz;
    const dy = Math.sin(t * ao.driftFY * spd + ao.driftPY) * ao.driftAmp * motion.vert;
    const dz = Math.cos(t * ao.driftFZ * spd + ao.driftPZ) * ao.driftAmp * motion.horiz * .6;

    const x = ao.squadPos.x + ox + dx;
    const y = ao.squadPos.y + oy + dy;
    const z = ao.squadPos.z + oz + dz;
    ao.group.position.set(x, y, z);

    // Pulsing glow
    const breathe = .85+.15*Math.sin(t*1.8+i*.85);
    const sel = selectedAO===ao;
    ao.group.children[1].scale.setScalar(.9*breathe*(sel?2.5:1));
    ao.group.children[2].scale.setScalar(1.8*breathe*(sel?2.5:1));

    // Update line
    const lp = ao.line.geometry.attributes.position.array;
    lp[0]=ao.squadPos.x; lp[1]=ao.squadPos.y; lp[2]=ao.squadPos.z;
    lp[3]=x; lp[4]=y; lp[5]=z;
    ao.line.geometry.attributes.position.needsUpdate = true;

    // Pulse along line
    ao.pulseT = (ao.pulseT+.003*spd)%1;
    const p = ao.pulseT;
    ao.pulse.position.set(
      ao.squadPos.x+(x-ao.squadPos.x)*p,
      ao.squadPos.y+(y-ao.squadPos.y)*p,
      ao.squadPos.z+(z-ao.squadPos.z)*p
    );
    ao.pulse.material.opacity = Math.sin(p*Math.PI)*.7;

    placeLabel(agentLabelEls[i], ao.group);
  });

  // Cores
  SQUADS.forEach((sq,si) => {
    const g = squadCoreGroups[sq.id];
    if (!g) return;
    g.children[0].rotation.y = t*.35;
    placeLabel(squadLabelEls[si].el, g.children[0], -12);
  });

  // Bridge lines
  bridgeLines.forEach(b => {
    const a = agentMap[`${b.from.squad}:${b.from.agent}`];
    const c = agentMap[`${b.to.squad}:${b.to.agent}`];
    if (!a||!c) return;
    const lp = b.line.geometry.attributes.position.array;
    lp[0]=a.group.position.x; lp[1]=a.group.position.y; lp[2]=a.group.position.z;
    lp[3]=c.group.position.x; lp[4]=c.group.position.y; lp[5]=c.group.position.z;
    b.line.geometry.attributes.position.needsUpdate = true;
    b.line.material.opacity = .05+.04*Math.sin(t*.8);
  });

  controls.update();
  composer.render(); // bloom post-processing
}

animate();

// ═══════════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloomPass.resolution.set(innerWidth, innerHeight);
});
</script>
</body>
