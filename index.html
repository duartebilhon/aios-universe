<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS — Universo de Agentes IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000410; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
    canvas { display: block; }

    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 22px 36px;
      display: flex; justify-content: space-between; align-items: flex-start;
      z-index: 100; pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,4,16,0.92) 0%, transparent 100%);
    }
    #header h1 {
      font-size: 24px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
      background: linear-gradient(90deg, #fff 0%, #88aaff 50%, #cc66ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #header .subtitle { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 4px; }
    #header .powered { text-align: right; }
    #header .powered .lbl { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
    #header .powered .brand { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.55); }

    .agent-label {
      position: fixed; pointer-events: none; text-align: center;
      transform: translate(-50%, -140%); z-index: 50; transition: opacity 0.35s;
    }
    .agent-label .a-icon { font-size: 14px; display: block; margin-bottom: 1px; }
    .agent-label .a-name { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
    .agent-label .a-role { font-size: 8px; color: rgba(255,255,255,0.38); letter-spacing: 0.5px; white-space: nowrap; }

    .squad-label {
      position: fixed; pointer-events: none; text-align: center;
      transform: translate(-50%, -220%); z-index: 50; transition: opacity 0.35s;
    }
    .squad-label .s-name { font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; white-space: nowrap; opacity: 0.6; }

    #info-card {
      position: fixed; right: -400px; top: 50%; transform: translateY(-50%);
      width: 330px;
      background: rgba(4, 8, 28, 0.9);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(120,160,255,0.13);
      border-radius: 20px; padding: 30px; z-index: 200;
      transition: right 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    #info-card.open { right: 28px; }
    #info-card .c-icon { font-size: 42px; margin-bottom: 12px; display: block; }
    #info-card .c-name { font-size: 24px; font-weight: 800; margin-bottom: 3px; }
    #info-card .c-role { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.38); margin-bottom: 13px; }
    #info-card .c-squad { display: inline-block; padding: 4px 13px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
    #info-card .c-desc { font-size: 12.5px; line-height: 1.8; color: rgba(255,255,255,0.62); margin-bottom: 20px; }
    #info-card .c-cmds-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 9px; }
    .cmd-tag { display: inline-block; background: rgba(100,150,255,0.1); border: 1px solid rgba(100,150,255,0.18); border-radius: 6px; padding: 4px 10px; font-size: 10px; font-family: monospace; margin: 3px; color: #88ccff; }
    #close-card { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    #close-card:hover { background: rgba(255,255,255,0.14); color: white; }

    #stats {
      position: fixed; bottom: 28px; left: 36px;
      display: flex; gap: 28px; pointer-events: none;
    }
    .stat .val { font-size: 20px; font-weight: 800; background: linear-gradient(90deg,#88aaff,#cc66ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat .key { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.28); }

    #hint { position: fixed; bottom: 28px; right: 36px; font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.18); text-transform: uppercase; pointer-events: none; animation: blink 5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.18} 50%{opacity:.55} }

    canvas { cursor: grab; }
    canvas:active { cursor: grabbing; }
    canvas.hover { cursor: pointer; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="header">
  <div>
    <h1>AIOS</h1>
    <div class="subtitle">Universe of Intelligent Agents</div>
  </div>
  <div class="powered">
    <div class="lbl">Powered by</div>
    <div class="brand">ProCustomer AI</div>
  </div>
</div>

<div id="info-card">
  <button id="close-card">✕</button>
  <span class="c-icon" id="c-icon">🤖</span>
  <div class="c-name" id="c-name">—</div>
  <div class="c-role" id="c-role">—</div>
  <span class="c-squad" id="c-squad">Squad</span>
  <div class="c-desc" id="c-desc">—</div>
  <div class="c-cmds-title">Invocar agente</div>
  <div id="c-cmds"></div>
</div>

<div id="stats">
  <div class="stat"><div class="val" id="sv-agents">—</div><div class="key">Agentes</div></div>

  <div class="stat"><div class="val">24/7</div><div class="key">Online</div></div>
</div>

<div id="hint">Clique num agente · Scroll zoom · Arraste órbita</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>

// ─────────────────────────────────────────────────────────────
//  DATA — Squads & Agents
// ─────────────────────────────────────────────────────────────
const SQUADS = [
  {
    id: 'core',
    name: 'AIOS Core',
    position: { x: 0, y: 0, z: 0 },
    color: 0xffaa22, colorHex: '#ffaa22', colorLight: '#ffcc66',
    coreSize: 0.7,
    agents: [
      { name: 'Master',    role: 'AIOS Master',      icon: '🧠', desc: 'Orquestra todo o ecossistema AIOS. Coordena squads, define arquitetura e garante alinhamento estratégico.', commands: ['/agents:aios-master'] },
      { name: 'Craft',     role: 'Squad Creator',    icon: '🏗️', desc: 'Cria e valida novos squads seguindo arquitetura task-first. Garante qualidade e estrutura do ecossistema.', commands: ['/agents:squad-creator'] },
      { name: 'Chief',     role: 'Squad Chief',      icon: '⚡', desc: 'Lidera squads em operações complexas multi-agente. Coordena execução e entrega de projetos.', commands: ['/agents:squad-chief'] },
      { name: 'ARES',      role: 'Agente do PC',     icon: '🔴', desc: 'Monitor inteligente do PC via WhatsApp. Recebe comandos por texto ou áudio e executa tarefas locais 24/7.', commands: ['/ares'] },
    ]
  },
  {
    id: 'comercial',
    name: 'Time Comercial',
    position: { x: -11, y: 1, z: -3 },
    color: 0x2266ff, colorHex: '#2266ff', colorLight: '#6699ff',
    agents: [
      { name: 'Duarte',   role: 'Head Comercial',   icon: '👔', desc: 'Orquestra toda a operação comercial. Define estratégia, metas e lidera o time de vendas high ticket.', commands: ['/agents:head-comercial'] },
      { name: 'Mariana',  role: 'Closer',            icon: '💎', desc: 'Especialista em fechamento de contratos high ticket. Converte leads qualificados em clientes.', commands: ['/agents:closer'] },
      { name: 'Taise',    role: 'SDR',               icon: '📡', desc: 'Prospecção ativa e qualificação de leads. Aquece o pipeline e agenda reuniões estratégicas.', commands: ['/agents:sdr'] },
      { name: 'Taynara',  role: 'Customer Success',  icon: '🌟', desc: 'Garante satisfação e retenção pós-venda. Gerencia onboarding e expansão de contas.', commands: ['/agents:cs-pos-venda'] },
      { name: 'Letícia',  role: 'Copywriter',        icon: '✍️', desc: 'Cria copy de vendas persuasivo para e-mail, WhatsApp, landing pages e anúncios.', commands: ['/agents:copywriter-vendas'] },
      { name: 'Peçanha',  role: 'Analista de Dados', icon: '📊', desc: 'Analisa métricas do funil, gera relatórios e insights para otimização da operação.', commands: ['/agents:analista-vendas'] },
    ]
  },
  {
    id: 'content',
    name: 'Content Creator',
    position: { x: 11, y: -1, z: -4 },
    color: 0xaa22ee, colorHex: '#aa22ee', colorLight: '#cc66ff',
    agents: [
      { name: 'Marco',   role: 'Estrategista',       icon: '🎯', desc: 'Define estratégia de conteúdo: temas, calendário editorial e posicionamento nos canais digitais.', commands: ['/agents:estrategista-conteudo'] },
      { name: 'Luna',    role: 'Roteirista',          icon: '🎬', desc: 'Escreve roteiros para vídeos, reels e apresentações com narrativa envolvente e storytelling.', commands: ['/agents:roteirista'] },
      { name: 'Pixel',   role: 'Produtor Vídeo IA',  icon: '🎥', desc: 'Produz vídeos com HeyGen + Runway. Avatares IA, motion e edição totalmente automatizada.', commands: ['/agents:produtor-video-ia'] },
      { name: 'Forma',   role: 'Adaptador',           icon: '🔄', desc: 'Adapta cada conteúdo para Instagram, TikTok e LinkedIn com formato nativo de cada plataforma.', commands: ['/agents:adaptador-conteudo'] },
      { name: 'Cronos',  role: 'Publicador',          icon: '⏰', desc: 'Agenda e publica conteúdo nos melhores horários em todas as plataformas automaticamente.', commands: ['/agents:publicador'] },
    ]
  },
  {
    id: 'dev',
    name: 'Dev Squad',
    position: { x: 2, y: 3, z: 12 },
    color: 0x22ddaa, colorHex: '#22ddaa', colorLight: '#66ffcc',
    agents: [
      { name: 'Dex',    role: 'Dev',              icon: '💻', desc: 'Implementa funcionalidades, resolve bugs e escreve código de produção seguindo os padrões AIOS.', commands: ['/agents:dev'] },
      { name: 'Gage',   role: 'DevOps',           icon: '🚀', desc: 'Gerencia infraestrutura, CI/CD, deploys e monitoramento de todos os sistemas AIOS.', commands: ['/agents:devops'] },
      { name: 'Arc',    role: 'Architect',        icon: '🏛️', desc: 'Define arquitetura de sistemas, padrões técnicos e decisões de design de alto nível.', commands: ['/agents:architect'] },
      { name: 'Quinn',  role: 'QA',               icon: '🔍', desc: 'Revisa código, cria testes e garante qualidade antes de qualquer entrega ao usuário.', commands: ['/agents:qa'] },
      { name: 'DataE',  role: 'Data Engineer',    icon: '🗄️', desc: 'Constrói pipelines de dados, integra APIs e garante que os dados fluam corretamente entre sistemas.', commands: ['/agents:data-engineer'] },
    ]
  },
  {
    id: 'product',
    name: 'Product Squad',
    position: { x: -4, y: -2, z: 11 },
    color: 0xff4488, colorHex: '#ff4488', colorLight: '#ff88bb',
    agents: [
      { name: 'PM',      role: 'Product Manager',  icon: '📋', desc: 'Define roadmap, prioriza features e alinha produto com objetivos de negócio.', commands: ['/agents:pm'] },
      { name: 'PO',      role: 'Product Owner',    icon: '🎯', desc: 'Gerencia backlog, escreve user stories e garante entrega de valor incremental.', commands: ['/agents:po'] },
      { name: 'SM',      role: 'Scrum Master',     icon: '🔁', desc: 'Facilita cerimônias ágeis, remove impedimentos e protege o time de distrações externas.', commands: ['/agents:sm'] },
      { name: 'Ana',     role: 'Analyst',          icon: '📈', desc: 'Analisa dados de produto, comportamento do usuário e gera insights para decisões estratégicas.', commands: ['/agents:analyst'] },
    ]
  },
];

// ─────────────────────────────────────────────────────────────
//  CROSS-SQUAD CONNECTIONS
// ─────────────────────────────────────────────────────────────
const BRIDGES = [
  { from: { squad: 'core',      agent: 'Master' }, to: { squad: 'comercial', agent: 'Duarte' } },
  { from: { squad: 'core',      agent: 'Master' }, to: { squad: 'content',   agent: 'Marco'  } },
  { from: { squad: 'core',      agent: 'Master' }, to: { squad: 'dev',       agent: 'Arc'    } },
  { from: { squad: 'core',      agent: 'Master' }, to: { squad: 'product',   agent: 'PM'     } },
  { from: { squad: 'comercial', agent: 'Duarte' }, to: { squad: 'content',   agent: 'Marco'  } },
  { from: { squad: 'dev',       agent: 'Dex'    }, to: { squad: 'product',   agent: 'PO'     } },
];

// ─────────────────────────────────────────────────────────────
//  SCENE
// ─────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x000308);
scene.fog        = new THREE.FogExp2(0x000308, 0.007);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 800);
camera.position.set(0, 10, 30);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.04;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.1;
controls.minDistance     = 6;
controls.maxDistance     = 70;
controls.maxPolarAngle   = Math.PI * 0.88;

// ─────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────
function makeGlowTex(hexColor) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const col = new THREE.Color(hexColor);
  const r = Math.round(col.r*255), g = Math.round(col.g*255), b = Math.round(col.b*255);
  const grad = ctx.createRadialGradient(64,64,0, 64,64,64);
  grad.addColorStop(0,   `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.2, `rgba(${r},${g},${b},0.7)`);
  grad.addColorStop(0.55,`rgba(${r},${g},${b},0.15)`);
  grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}

function glow(tex, scale, opacity) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity, blending: THREE.AdditiveBlending, depthWrite: false }));
  s.scale.setScalar(scale);
  return s;
}

// ─────────────────────────────────────────────────────────────
//  STARFIELD
// ─────────────────────────────────────────────────────────────
{
  const N = 5000, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random()-.5)*300;
    pos[i*3+1] = (Math.random()-.5)*300;
    pos[i*3+2] = (Math.random()-.5)*300;
    const v = .4+Math.random()*.6;
    col[i*3]=v*(.6+Math.random()*.4); col[i*3+1]=v*(.6+Math.random()*.4); col[i*3+2]=v;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size:.1, vertexColors:true, transparent:true, opacity:.9 })));
}

// ─────────────────────────────────────────────────────────────
//  NEBULAE
// ─────────────────────────────────────────────────────────────
function nebula(cx,cy,cz, hex, n, rad) {
  const pos=new Float32Array(n*3), col=new Float32Array(n*3), c=new THREE.Color(hex);
  for (let i=0;i<n;i++) {
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), r=Math.pow(Math.random(),.35)*rad;
    pos[i*3]=cx+r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=cy+r*Math.sin(ph)*Math.sin(th)*.3; pos[i*3+2]=cz+r*Math.cos(ph);
    const br=.15+Math.random()*.55;
    col[i*3]=c.r*br; col[i*3+1]=c.g*br; col[i*3+2]=c.b*br;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',   new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size:.3,vertexColors:true,transparent:true,opacity:.2,sizeAttenuation:true })));
}

nebula(  0,  0,  0, '#cc8800', 500, 5);   // core — golden
nebula(-11,  1, -3, '#1133cc', 700, 9);   // comercial — blue
nebula( 11, -1, -4, '#771199', 700, 9);   // content — purple
nebula(  2,  3, 12, '#116644', 600, 8);   // dev — green
nebula( -4, -2, 11, '#991144', 600, 8);   // product — red
nebula(  0, -8,-14, '#112244', 400, 10);  // bg
nebula(  6,  8, -8, '#220066', 300,  7);  // bg

// ─────────────────────────────────────────────────────────────
//  SQUAD CORES
// ─────────────────────────────────────────────────────────────
const squadCoreGroups = {};

SQUADS.forEach(sq => {
  const g = new THREE.Group();
  g.position.set(sq.position.x, sq.position.y, sq.position.z);

  // Core sphere
  const sz = sq.coreSize || 0.38;
  const core = new THREE.Mesh(new THREE.SphereGeometry(sz,16,16), new THREE.MeshBasicMaterial({ color: sq.color }));
  g.add(core);

  // Glow layers
  const t = makeGlowTex(sq.colorHex);
  g.add(glow(t, 6,  0.5));
  g.add(glow(t, 14, 0.15));

  // Rings (3 tilted rings per squad)
  for (let k = 0; k < 3; k++) {
    const ringGeo = new THREE.RingGeometry(2.4+k*0.4, 2.5+k*0.4, 80);
    const ringMat = new THREE.MeshBasicMaterial({ color: sq.color, transparent:true, opacity: 0.07-(k*0.01), side:THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2 + (Math.random()-.5)*.5 + k*.3;
    ring.rotation.z = (Math.random()-.5)*.4 + k*.2;
    g.add(ring);
  }

  scene.add(g);
  squadCoreGroups[sq.id] = g;
});

// ─────────────────────────────────────────────────────────────
//  AGENT NODES
// ─────────────────────────────────────────────────────────────
const agentObjects = [];
const agentMap = {}; // "squadId:agentName" → agentObj

SQUADS.forEach(sq => {
  const n = sq.agents.length;
  sq.agents.forEach((agent, i) => {
    // Orbital parameters — fully 3D
    const orbitRadius = 2.4 + (i % 3) * 0.75;
    const orbitPhase  = (i / n) * Math.PI * 2 + Math.random() * 0.5;
    const orbitSpeed  = 0.09 + i * 0.015 + Math.random() * 0.02;
    // KEY: inclination gives true 3D up/down movement
    const inclination = (Math.random() - 0.5) * Math.PI * 0.9;  // -81° to +81°
    const orbitTiltZ  = (Math.random() - 0.5) * 0.6;

    // Initial position
    const ax = sq.position.x + Math.cos(orbitPhase) * orbitRadius;
    const ay = sq.position.y + Math.sin(orbitPhase) * orbitRadius * Math.sin(inclination);
    const az = sq.position.z + Math.sin(orbitPhase) * orbitRadius * Math.cos(inclination);

    // Node
    const group = new THREE.Group();
    group.position.set(ax, ay, az);

    const agentCol = new THREE.Color(sq.color).lerp(new THREE.Color(0xffffff), 0.3);
    const sphere   = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 10, 10),
      new THREE.MeshBasicMaterial({ color: agentCol })
    );
    sphere.userData.isAgent = true;
    sphere.userData.idx = agentObjects.length;
    group.add(sphere);

    const glowTex = makeGlowTex('#' + agentCol.getHexString());
    group.add(glow(glowTex, 0.9, 0.8));
    scene.add(group);

    // Connection line
    const linePos = new Float32Array([sq.position.x,sq.position.y,sq.position.z, ax,ay,az]);
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
    const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: sq.color, transparent:true, opacity:0.1 }));
    scene.add(line);

    // Pulse
    const pulseSprite = glow(makeGlowTex(sq.colorHex), 0.25, 0);
    scene.add(pulseSprite);

    // Drift params — sinusoidal lateral + vertical float per agent
    const driftAmp   = 0.4 + Math.random() * 0.5;
    const driftFreqX = 0.06 + Math.random() * 0.08;
    const driftFreqY = 0.05 + Math.random() * 0.07;
    const driftFreqZ = 0.07 + Math.random() * 0.06;
    const driftPX    = Math.random() * Math.PI * 2;
    const driftPY    = Math.random() * Math.PI * 2;
    const driftPZ    = Math.random() * Math.PI * 2;

    const ao = { group, sphere, line, pulse: pulseSprite, agent, squad: sq,
      orbitPhase, orbitRadius, orbitSpeed, inclination, orbitTiltZ,
      driftAmp, driftFreqX, driftFreqY, driftFreqZ, driftPX, driftPY, driftPZ,
      pulseT: Math.random(), squadPos: sq.position };

    agentObjects.push(ao);
    agentMap[`${sq.id}:${agent.name}`] = ao;
  });
});

// ─────────────────────────────────────────────────────────────
//  BRIDGE LINES (cross-squad)
// ─────────────────────────────────────────────────────────────
const bridgeLines = [];
BRIDGES.forEach(b => {
  const linePos = new Float32Array(6);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  const mat = new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.08 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  bridgeLines.push({ line, from: b.from, to: b.to });
});

// ─────────────────────────────────────────────────────────────
//  HTML LABELS
// ─────────────────────────────────────────────────────────────
const labelsDiv = document.createElement('div');
labelsDiv.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:55;';
document.body.appendChild(labelsDiv);

const agentLabelEls = agentObjects.map(ao => {
  const el = document.createElement('div');
  el.className = 'agent-label';
  el.innerHTML = `<span class="a-icon">${ao.agent.icon}</span><div class="a-name" style="color:${ao.squad.colorLight}">${ao.agent.name}</div><div class="a-role">${ao.agent.role}</div>`;
  labelsDiv.appendChild(el);
  return el;
});

const squadLabelEls = SQUADS.map(sq => {
  const el = document.createElement('div');
  el.className = 'squad-label';
  el.innerHTML = `<div class="s-name" style="color:${sq.colorLight}">${sq.name}</div>`;
  labelsDiv.appendChild(el);
  return { el, sq };
});

// Update stats
const totalAgents = SQUADS.reduce((s,q) => s+q.agents.length, 0);
document.getElementById('sv-agents').textContent = totalAgents;
document.getElementById('sv-squads').textContent = SQUADS.length;

// ─────────────────────────────────────────────────────────────
//  INTERACTION
// ─────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2(-9999,-9999);
const _v        = new THREE.Vector3();
let   selectedAO = null;
const clickTargets = agentObjects.map(ao => ao.sphere);

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  canvas.className = raycaster.intersectObjects(clickTargets).length ? 'hover' : '';
});

canvas.addEventListener('click', e => {
  mouse.x =  (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) openCard(agentObjects[hits[0].object.userData.idx]);
});

function openCard(ao) {
  selectedAO = ao;
  document.getElementById('c-icon').textContent = ao.agent.icon;
  document.getElementById('c-name').textContent = ao.agent.name;
  document.getElementById('c-role').textContent = ao.agent.role;
  document.getElementById('c-desc').textContent = ao.agent.desc;
  const sqEl = document.getElementById('c-squad');
  sqEl.textContent      = ao.squad.name;
  sqEl.style.background = ao.squad.colorHex + '22';
  sqEl.style.color      = ao.squad.colorLight;
  sqEl.style.border     = '1px solid ' + ao.squad.colorHex + '44';
  document.getElementById('c-cmds').innerHTML = ao.agent.commands.map(c=>`<span class="cmd-tag">${c}</span>`).join('');
  document.getElementById('info-card').classList.add('open');
}

document.getElementById('close-card').addEventListener('click', () => {
  document.getElementById('info-card').classList.remove('open');
  selectedAO = null;
});

// ─────────────────────────────────────────────────────────────
//  LABEL PROJECTION
// ─────────────────────────────────────────────────────────────
function placeLabel(el, object3D, extraY = 0) {
  _v.setFromMatrixPosition(object3D.matrixWorld);
  _v.project(camera);
  if (Math.abs(_v.x)>1.25 || Math.abs(_v.y)>1.25 || _v.z>1) { el.style.opacity='0'; return; }
  el.style.opacity = '1';
  el.style.left = ((_v.x*.5+.5)*innerWidth)  + 'px';
  el.style.top  = ((-_v.y*.5+.5)*innerHeight + extraY) + 'px';
}

// ─────────────────────────────────────────────────────────────
//  ANIMATION
// ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Agent orbits — TRUE 3D (inclination drives Y movement)
  agentObjects.forEach((ao, i) => {
    const angle = ao.orbitPhase + t * ao.orbitSpeed;
    // Orbital base
    const ox = Math.cos(angle) * ao.orbitRadius;
    const oy = Math.sin(angle) * ao.orbitRadius * Math.sin(ao.inclination);
    const oz = Math.sin(angle) * ao.orbitRadius * Math.cos(ao.inclination);
    // Sinusoidal drift — lateral + vertical
    const dx = Math.sin(t * ao.driftFreqX + ao.driftPX) * ao.driftAmp;
    const dy = Math.sin(t * ao.driftFreqY + ao.driftPY) * ao.driftAmp * 0.7;
    const dz = Math.cos(t * ao.driftFreqZ + ao.driftPZ) * ao.driftAmp * 0.5;

    const x = ao.squadPos.x + ox + dx;
    const y = ao.squadPos.y + oy + dy;
    const z = ao.squadPos.z + oz + dz;

    ao.group.position.set(x, y, z);

    // Pulse glow
    const breathe = .85 + .15 * Math.sin(t*1.8 + i*.85);
    const isSelected = selectedAO === ao;
    ao.group.children[1].scale.setScalar(.9 * breathe * (isSelected ? 2.5 : 1));

    // Update connection line
    const lp = ao.line.geometry.attributes.position.array;
    lp[0]=ao.squadPos.x; lp[1]=ao.squadPos.y; lp[2]=ao.squadPos.z;
    lp[3]=x; lp[4]=y; lp[5]=z;
    ao.line.geometry.attributes.position.needsUpdate = true;

    // Pulse particle travels along line
    ao.pulseT = (ao.pulseT + 0.0035) % 1;
    const p = ao.pulseT;
    ao.pulse.position.set(
      ao.squadPos.x + (x-ao.squadPos.x)*p,
      ao.squadPos.y + (y-ao.squadPos.y)*p,
      ao.squadPos.z + (z-ao.squadPos.z)*p
    );
    ao.pulse.material.opacity = Math.sin(p*Math.PI) * .7;

    placeLabel(agentLabelEls[i], ao.group);
  });

  // Squad cores slow rotation
  SQUADS.forEach((sq, si) => {
    const g = squadCoreGroups[sq.id];
    if (!g) return;
    g.children[0].rotation.y = t * 0.35;
    placeLabel(squadLabelEls[si].el, g.children[0], -12);
  });

  // Bridge lines — connect current agent positions
  bridgeLines.forEach(b => {
    const aoA = agentMap[`${b.from.squad}:${b.from.agent}`];
    const aoB = agentMap[`${b.to.squad}:${b.to.agent}`];
    if (!aoA || !aoB) return;
    const lp = b.line.geometry.attributes.position.array;
    lp[0]=aoA.group.position.x; lp[1]=aoA.group.position.y; lp[2]=aoA.group.position.z;
    lp[3]=aoB.group.position.x; lp[4]=aoB.group.position.y; lp[5]=aoB.group.position.z;
    b.line.geometry.attributes.position.needsUpdate = true;
    b.line.material.opacity = .05 + .04*Math.sin(t*.8);
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
